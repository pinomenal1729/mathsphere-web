<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>MathSphere v10.0 — The Mathematical Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.26.0/plotly.min.js"></script>
<style>
:root{
  --bg-deep:#0a0e27;--bg-main:#0f1437;--bg-light:#14194f;
  --acc-p:#00d9ff;--acc-s:#7c3aed;--acc-t:#06f7d6;
  --tx-p:#f8fafc;--tx-s:#a8b7d1;--tx-t:#6b7a94;
  --gold:#d4a574;--danger:#ff6b6b;
  --sb-bg:rgba(10,14,39,.95);--tb-bg:rgba(10,14,39,.8);
  --inp-bg:rgba(20,25,79,.7);--card-bg:rgba(0,217,255,.06);
  --res-bg:rgba(0,0,0,.3);--border:rgba(0,217,255,.2);
  --font-d:'Playfair Display',serif;--font-b:'Poppins',sans-serif;--font-m:'JetBrains Mono',monospace;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
body.light{
  --bg-deep:#e8f4ff;--bg-main:#f0f6ff;
  --tx-p:#0a1628;--tx-s:#2a4a7f;--tx-t:#5a7aaf;
  --sb-bg:rgba(220,235,255,.97);--tb-bg:rgba(220,235,255,.92);
  --inp-bg:rgba(255,255,255,.95);--card-bg:rgba(255,255,255,.9);
  --res-bg:rgba(255,255,255,.9);--border:rgba(0,120,255,.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;position:fixed;overflow:hidden;}
body{background:linear-gradient(135deg,var(--bg-deep),#1a1f4b);color:var(--tx-p);font-family:var(--font-b);font-size:14px;line-height:1.65;transition:background .4s,color .3s;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(circle at 20% 80%,rgba(0,217,255,.15),transparent 50%),
             radial-gradient(circle at 80% 20%,rgba(124,58,237,.1),transparent 50%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(0deg,transparent 24%,rgba(0,217,255,.04) 25%,rgba(0,217,255,.04) 26%,transparent 27%),
                   linear-gradient(90deg,transparent 24%,rgba(0,217,255,.04) 25%,rgba(0,217,255,.04) 26%,transparent 27%);
  background-size:60px 60px;opacity:.4;}

/* ── FLOATING MATH ─────────────────────────────────── */
.math-float{position:fixed;opacity:.04;pointer-events:none;z-index:0;
  font-family:var(--font-m);color:var(--acc-p);animation:floatSym 20s infinite ease-in-out;}
.float-text{position:fixed;opacity:.06;pointer-events:none;z-index:0;
  font-family:var(--font-d);font-weight:800;letter-spacing:6px;text-transform:uppercase;
  color:var(--acc-p);animation:floatTxt 28s infinite ease-in-out;white-space:nowrap;}
@keyframes floatSym{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-22px) rotate(180deg)}}
@keyframes floatTxt{0%,100%{transform:translateY(0) rotate(-12deg)}50%{transform:translateY(-28px) rotate(-12deg)}}

/* ── LAYOUT ─────────────────────────────────────────── */
#app{position:relative;z-index:1;display:flex;height:100%;width:100%;overflow:hidden;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ── SIDEBAR ────────────────────────────────────────── */
#sidebar{width:262px;flex-shrink:0;background:var(--sb-bg);backdrop-filter:blur(20px);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  overflow:hidden;transition:transform .3s ease,background .4s;z-index:50;}
.logo-wrap{padding:18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;
  background:linear-gradient(135deg,rgba(0,217,255,.04),rgba(124,58,237,.04));}
.logo-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,var(--acc-p),var(--acc-s));
  box-shadow:0 0 30px rgba(0,217,255,.4);animation:glow 3s ease-in-out infinite;}
.logo-icon img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,217,255,.3)}50%{box-shadow:0 0 40px rgba(0,217,255,.6)}}
.logo-name{font-family:var(--font-d);font-size:17px;font-weight:800;
  background:linear-gradient(135deg,var(--tx-p),var(--acc-p));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.logo-by{font-size:10px;color:var(--tx-t);font-family:var(--font-m);letter-spacing:1.5px;text-transform:uppercase;}
.sb-scroll{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:rgba(0,217,255,.3) transparent;}
.sb-scroll::-webkit-scrollbar{width:4px;}.sb-scroll::-webkit-scrollbar-thumb{background:rgba(0,217,255,.3);border-radius:2px;}
.sb-section{padding:12px 12px 4px;font-size:9px;color:var(--tx-t);font-family:var(--font-m);
  letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:none;
  background:transparent;color:var(--tx-s);cursor:pointer;border-radius:8px;
  font-family:var(--font-b);font-size:13px;font-weight:500;transition:all .25s;
  text-align:left;margin:2px 0;position:relative;overflow:hidden;}
.nav-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--acc-p),var(--acc-s));
  transform:scaleY(0);transition:transform .25s;border-radius:0 2px 2px 0;}
.nav-btn:hover{color:var(--tx-p);background:rgba(0,217,255,.07);transform:translateX(3px);}
.nav-btn.active{background:rgba(0,217,255,.12);color:var(--acc-p);border:1px solid rgba(0,217,255,.3);}
.nav-btn.active::before{transform:scaleY(1);}
.nav-btn .em{font-size:15px;transition:transform .25s;}.nav-btn:hover .em{transform:scale(1.2);}
.sb-links{padding:10px 8px;border-top:1px solid var(--border);display:flex;gap:6px;}
.sb-link{flex:1;text-align:center;padding:7px;background:rgba(0,217,255,.06);border:1px solid var(--border);
  border-radius:7px;color:var(--tx-s);text-decoration:none;font-size:11px;transition:all .25s;}
.sb-link:hover{color:var(--acc-p);background:rgba(0,217,255,.13);}

/* ── TOPBAR ─────────────────────────────────────────── */
#topbar{display:flex;align-items:center;gap:10px;padding:12px 20px;
  padding-top:calc(12px + var(--safe-t));border-bottom:1px solid var(--border);
  background:var(--tb-bg);backdrop-filter:blur(20px);flex-shrink:0;width:100%;}
#mode-title{font-family:var(--font-d);font-weight:700;font-size:17px;
  background:linear-gradient(135deg,var(--tx-p),var(--acc-p));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;flex:1;white-space:nowrap;transition:opacity .2s;}
.status-dot{width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc-t),var(--acc-p));
  box-shadow:0 0 12px var(--acc-t);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.topbar-btn{background:rgba(0,217,255,.08);border:1px solid rgba(0,217,255,.22);
  color:var(--tx-s);padding:6px 12px;border-radius:7px;font-family:var(--font-m);
  font-size:10px;cursor:pointer;transition:all .25s;white-space:nowrap;}
.topbar-btn:hover{background:rgba(0,217,255,.16);border-color:var(--acc-p);color:var(--acc-p);}
#owner-name{font-family:var(--font-d);font-weight:700;font-size:11px;color:var(--acc-t);
  padding:5px 10px;border:1px solid rgba(6,247,214,.3);border-radius:999px;
  background:rgba(6,247,214,.08);white-space:nowrap;}
#menu-toggle{display:none;background:rgba(0,217,255,.1);border:1px solid rgba(0,217,255,.2);
  color:var(--tx-s);width:34px;height:34px;border-radius:7px;cursor:pointer;font-size:16px;
  align-items:center;justify-content:center;flex-shrink:0;}

/* ── TAGS ───────────────────────────────────────────── */
#tagsbar{display:flex;gap:8px;padding:9px 20px;border-bottom:1px solid rgba(0,217,255,.07);
  background:rgba(20,25,79,.25);overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
#tagsbar::-webkit-scrollbar{display:none;}
.tag{background:rgba(0,217,255,.07);border:1px solid rgba(0,217,255,.18);color:var(--tx-s);
  padding:5px 13px;border-radius:20px;font-size:11px;font-family:var(--font-m);
  cursor:pointer;white-space:nowrap;transition:all .25s;flex-shrink:0;}
.tag:hover{background:rgba(0,217,255,.15);border-color:var(--acc-p);color:var(--acc-p);transform:translateY(-2px);}

/* ── CHAT ───────────────────────────────────────────── */
#chat{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;
  display:flex;flex-direction:column;gap:16px;
  scrollbar-width:thin;scrollbar-color:rgba(0,217,255,.2) transparent;}
#chat::-webkit-scrollbar{width:5px;}#chat::-webkit-scrollbar-thumb{background:rgba(0,217,255,.2);border-radius:3px;}
.msg{display:flex;gap:10px;animation:msgIn .3s cubic-bezier(.4,0,.2,1);}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;overflow:hidden;}
.msg.user .avatar{background:linear-gradient(135deg,#1a2d5c,#2a1f4f);border:1px solid rgba(124,58,237,.3);}
.msg.bot .avatar{background:linear-gradient(135deg,var(--acc-p),var(--acc-s));box-shadow:0 0 15px rgba(0,217,255,.35);}
.msg.bot .avatar img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
.bubble{max-width:80%;padding:13px 16px;border-radius:14px;font-size:13.5px;line-height:1.85;
  overflow-wrap:break-word;word-break:break-word;min-width:0;backdrop-filter:blur(10px);}
.msg.user .bubble{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(0,217,255,.07));
  border:1px solid rgba(124,58,237,.22);border-top-right-radius:3px;}
.msg.bot .bubble{background:linear-gradient(135deg,rgba(0,217,255,.07),rgba(20,25,79,.5));
  border:1px solid rgba(0,217,255,.18);border-top-left-radius:3px;position:relative;}
.msg.bot .bubble::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,var(--acc-p),var(--acc-s),var(--acc-t),transparent);
  border-radius:14px 14px 0 0;opacity:.5;}
.bubble code{font-family:var(--font-m);font-size:11.5px;background:rgba(0,0,0,.35);padding:2px 5px;border-radius:4px;color:var(--acc-t);}
.bubble pre{background:rgba(0,0,0,.45);border:1px solid rgba(0,217,255,.18);border-radius:8px;
  padding:12px;margin:8px 0;overflow-x:auto;font-family:var(--font-m);font-size:11px;
  line-height:1.65;color:var(--acc-t);white-space:pre-wrap;}
.bubble h2,.bubble h3{font-family:var(--font-d);color:var(--acc-p);margin:10px 0 4px;}
.bubble strong{color:var(--tx-p);}
.bubble em{color:var(--gold);}
.bubble hr{border:none;border-top:1px solid var(--border);margin:10px 0;}

/* ── INPUT AREA ─────────────────────────────────────── */
#inputarea{padding:12px 20px;padding-bottom:calc(12px + var(--safe-b));border-top:1px solid var(--border);
  background:var(--tb-bg);backdrop-filter:blur(20px);flex-shrink:0;width:100%;}
.inp-wrap{display:flex;gap:8px;align-items:flex-end;background:var(--inp-bg);
  border:1px solid rgba(0,217,255,.22);border-radius:12px;padding:9px 10px 9px 14px;
  transition:all .25s;min-height:46px;}
.inp-wrap:focus-within{border-color:var(--acc-p);box-shadow:0 6px 30px rgba(0,217,255,.13);}
#input{flex:1;background:none;border:none;outline:none;color:var(--tx-p);
  font-family:var(--font-b);font-size:14px;line-height:1.6;resize:none;
  max-height:120px;min-height:24px;font-weight:500;}
#input::placeholder{color:var(--tx-t);}
.iico{width:34px;height:34px;background:rgba(0,217,255,.08);border:1px solid rgba(0,217,255,.2);
  border-radius:7px;color:var(--tx-t);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:14px;transition:all .25s;flex-shrink:0;}
.iico:hover{background:rgba(0,217,255,.18);border-color:var(--acc-p);color:var(--acc-p);transform:scale(1.1);}
#send-btn{width:34px;height:34px;background:linear-gradient(135deg,var(--acc-p),var(--acc-s));
  border:none;border-radius:7px;color:white;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:15px;box-shadow:0 4px 15px rgba(0,217,255,.3);
  transition:all .25s;flex-shrink:0;}
#send-btn:hover{transform:scale(1.12) rotate(8deg);box-shadow:0 8px 25px rgba(0,217,255,.5);}
#send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.inp-hint{text-align:center;margin-top:6px;font-size:10px;color:var(--tx-t);font-family:var(--font-m);}
#imgpreview{display:none;margin-bottom:8px;position:relative;width:fit-content;}
#imgpreview img{width:64px;height:48px;object-fit:cover;border-radius:7px;border:1px solid rgba(0,217,255,.3);}
#imgpreview button{position:absolute;top:-5px;right:-5px;width:16px;height:16px;background:var(--danger);
  border-radius:50%;border:none;color:white;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ── WELCOME ────────────────────────────────────────── */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:30px 20px;text-align:center;animation:welcomeIn .6s ease;overflow-y:auto;}
@keyframes welcomeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.big-icon{width:88px;height:88px;border-radius:22px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 20px 50px rgba(0,217,255,.4);animation:iconFloat 4s ease-in-out infinite;
  margin-bottom:22px;overflow:hidden;background:linear-gradient(135deg,var(--acc-p),var(--acc-s));}
.big-icon img{width:100%;height:100%;object-fit:cover;border-radius:20px;}
@keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#welcome h1{font-family:var(--font-d);font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:10px;
  background:linear-gradient(135deg,var(--tx-p),var(--acc-p));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
#welcome p{color:var(--tx-s);max-width:460px;font-size:13px;line-height:1.8;margin-bottom:22px;}
.feat-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:580px;}
.feat{background:rgba(0,217,255,.07);border:1px solid rgba(0,217,255,.17);border-radius:8px;
  padding:7px 13px;font-size:11px;color:var(--tx-s);font-family:var(--font-m);
  transition:all .25s;cursor:default;}
.feat:hover{background:rgba(0,217,255,.13);border-color:var(--acc-p);color:var(--acc-p);transform:translateY(-3px);}

/* ── PANELS ─────────────────────────────────────────── */
#chat > .panel-card{max-width:900px;width:100%;margin:0 auto;}
.panel-card{background:linear-gradient(135deg,rgba(0,217,255,.06),rgba(124,58,237,.06));
  border:1px solid rgba(0,217,255,.18);border-radius:14px;padding:22px;
  animation:cardIn .35s ease;}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.panel-title{font-family:var(--font-d);font-weight:700;font-size:17px;color:var(--tx-p);margin-bottom:4px;}
.panel-sub{font-size:11px;color:var(--tx-t);font-family:var(--font-m);margin-bottom:16px;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.form-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:140px;}
.form-label{font-size:10px;color:var(--tx-t);font-family:var(--font-m);letter-spacing:1px;text-transform:uppercase;}
.form-input,.form-select{background:rgba(20,25,79,.75);border:1px solid rgba(0,217,255,.2);
  color:var(--tx-p);border-radius:8px;padding:9px 12px;font-family:var(--font-b);font-size:13px;
  outline:none;transition:all .25s;}
.form-input:focus,.form-select:focus{border-color:var(--acc-p);box-shadow:0 0 12px rgba(0,217,255,.13);}
.form-select option{background:var(--bg-main);color:var(--tx-p);}
.action-btn{background:linear-gradient(135deg,var(--acc-p),var(--acc-s));border:none;color:white;
  padding:11px 24px;border-radius:9px;font-family:var(--font-b);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .25s;box-shadow:0 4px 15px rgba(0,217,255,.3);}
.action-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,217,255,.45);}
.action-btn:disabled{opacity:.4;cursor:not-allowed;}
.result-box{background:var(--res-bg);border:1px solid rgba(0,217,255,.14);border-radius:10px;
  padding:18px;margin-top:14px;line-height:1.9;font-size:13.5px;color:var(--tx-p);
  overflow-wrap:break-word;max-height:60vh;overflow-y:auto;scrollbar-width:thin;}
.result-box::-webkit-scrollbar{width:4px;}.result-box::-webkit-scrollbar-thumb{background:rgba(0,217,255,.2);border-radius:2px;}
.graph-box{background:rgba(0,0,0,.3);border:1px solid rgba(0,217,255,.18);border-radius:10px;
  padding:12px;margin-top:12px;height:380px;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;}
.sec-btn{background:rgba(0,217,255,.08);border:1px solid rgba(0,217,255,.2);color:var(--tx-s);
  padding:11px 18px;border-radius:9px;font-family:var(--font-b);font-size:13px;cursor:pointer;
  transition:all .25s;flex:1;min-width:120px;}
.sec-btn:hover{background:rgba(0,217,255,.16);color:var(--acc-p);}

/* ── TYPING ─────────────────────────────────────────── */
.typing{display:flex;gap:5px;padding:12px 14px;background:rgba(0,217,255,.07);
  border:1px solid rgba(0,217,255,.18);border-radius:14px;border-top-left-radius:3px;width:fit-content;}
.td{width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,var(--acc-p),var(--acc-s));animation:bounce 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-9px);opacity:1}}

/* ── TOAST ──────────────────────────────────────────── */
.toast{position:fixed;top:18px;right:18px;padding:11px 16px;border-radius:9px;
  font-size:12px;z-index:9999;font-family:var(--font-m);
  animation:toastIn .3s ease;backdrop-filter:blur(10px);border:1px solid;}
@keyframes toastIn{from{opacity:0;transform:translateX(80px)}to{opacity:1;transform:translateX(0)}}
.toast.ok{background:rgba(6,247,214,.1);border-color:rgba(6,247,214,.3);color:var(--acc-t);}
.toast.info{background:rgba(0,217,255,.1);border-color:rgba(0,217,255,.3);color:var(--acc-p);}
.toast.err{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.3);color:#ff6b6b;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,217,255,.3);
  border-top-color:var(--acc-p);border-radius:50%;animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── KATEX ──────────────────────────────────────────── */
.katex{color:var(--tx-p)!important;}.katex-display{margin:10px 0;overflow-x:auto;}

/* ── PYQ CONTAINER ──────────────────────────────────── */
#pyq-container{display:none;margin-top:16px;background:rgba(0,217,255,.04);
  border:1px solid rgba(0,217,255,.18);border-radius:10px;padding:18px;}
#pyq-progress{font-size:12px;color:var(--tx-t);font-family:var(--font-m);margin-bottom:10px;}
#pyq-content{color:var(--tx-p);line-height:1.9;margin-bottom:14px;font-size:13.5px;}
#pyq-solution{display:none;margin-top:14px;padding:16px;background:rgba(0,217,255,.08);
  border-radius:8px;border-left:3px solid var(--acc-p);color:var(--tx-p);line-height:1.9;}

/* ══════════════════════════════════════════════════════════
   KATEX — SAFE RENDER (waits for library)
══════════════════════════════════════════════════════════ */
function renderMath(el) {
  if (!el) return;
  const attempt = () => {
    if (typeof renderMathInElement === 'undefined') {
      setTimeout(attempt, 200);
      return;
    }
    try {
      renderMathInElement(el, {
        delimiters: [
          { left: '\\[',  right: '\\]',  display: true  },
          { left: '\\(',  right: '\\)',  display: false },
          { left: '$$',   right: '$$',   display: true  },
          { left: '$',    right: '$',    display: false }
        ],
        throwOnError: false,
        errorColor: '#ff6b6b',
        strict: false
      });
    } catch(e) { /* silent */ }
  };
  attempt();
}

/* ══════════════════════════════════════════════════════════
   FORMAT TEXT → HTML  (preserves LaTeX before escaping)
══════════════════════════════════════════════════════════ */
function fmt(raw) {
  if (!raw) return '';
  let t = String(raw);

  // 1. Save LaTeX blocks before any escaping
  const saved = [];
  const save  = m => { saved.push(m); return `\x00${saved.length-1}\x00`; };

  t = t.replace(/\\\[[\s\S]*?\\\]/g, save);
  t = t.replace(/\\\([\s\S]*?\\\)/g, save);
  t = t.replace(/\$\$[\s\S]*?\$\$/g, save);
  t = t.replace(/\$[^\$\n]+?\$/g,    save);

  // 2. Escape HTML in the non-math parts
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // 3. Restore saved LaTeX (unescaped)
  t = t.replace(/\x00(\d+)\x00/g, (_, i) => saved[+i]);

  // 4. Markdown-ish formatting
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre>$1</pre>');
  t = t.replace(/`([^`\n]+)`/g,              '<code>$1</code>');
  t = t.replace(/\*\*([^*]+)\*\*/g,          '<strong>$1</strong>');
  t = t.replace(/\*([^*\n]+)\*/g,            '<em>$1</em>');
  t = t.replace(/^#{3} (.+)$/gm,             '<h3>$1</h3>');
  t = t.replace(/^#{2} (.+)$/gm,             '<h2>$1</h2>');
  t = t.replace(/^---+$/gm,                  '<hr/>');
  t = t.replace(/\n/g, '<br>');

  return t;
}

function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById(`nav-${m}`);
  if (nb) nb.classList.add('active');

  const mt = document.getElementById('mode-title');
  mt.style.opacity = '0';
  setTimeout(() => { mt.textContent = (MODES[m]||MODES.ask).title; mt.style.opacity = '1'; }, 150);

  const ph = (MODES[m]||MODES.ask).ph;
  if (ph) document.getElementById('input').placeholder = ph;

  document.getElementById('sidebar').classList.remove('open');
  renderTagsBar();

  if (m === 'ask') showWelcome();
  else             renderPanel(m);
}

    graph:         () => { document.getElementById('g-expr').value  = val; runGraph();   },

    exams:         () => { document.getElementById('exam-sel').value= val; showExamDetails(); },

    mathematician: () => { document.getElementById('m-name').value  = val; runMathematician(); },
    theorem:       () => { document.getElementById('t-name').value  = val; runTheorem();  },
    projects:      () => { document.getElementById('p-topic').value = val; runProjects(); },
  };
  if (actions[mode]) actions[mode]();

/* ══════════════════════════════════════════════════════════
   API HELPERS
══════════════════════════════════════════════════════════ */
async function api(url, payload) {
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${r.status}`);
  }
  return r.json();
}

function setBtn(id, loading, label) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? `<span class="spin"></span>${label}` : label;
}

function showResult(id, html, isErr=false) {
  const box = document.getElementById(id);
  if (!box) return;
  box.style.display = 'block';
  box.style.borderColor = isErr ? 'rgba(255,107,107,.35)' : 'rgba(0,217,255,.15)';
  box.innerHTML = html;
  setTimeout(() => { renderMath(box); box.scrollTop = 0; }, 80);
}

/* ── Graph ── */
async function runGraph() {
  const expr  = V('g-expr') || 'x**2';
  const gtype = V('g-type') || '2d';
  setBtn('g-btn', true, 'Plotting…');
  try {
    const r = await api('/api/graph', { expression: expr, type: gtype });
    const pb = document.getElementById('g-plotbox');

    if (r.points && r.points.length > 0) {
      pb.style.display = 'block';
      const pts = r.points.filter(p => p.y !== null && isFinite(p.y));
      Plotly.newPlot(pb,
        [{
          x: pts.map(p=>p.x), y: pts.map(p=>p.y),
          type: 'scatter', mode: 'lines',
          line: { color: '#00d9ff', width: 2.5, shape: 'spline' },
          name: `f(x) = ${expr}`,
          fill: 'tozeroy', fillcolor: 'rgba(0,217,255,0.06)'
        }],
        {
          paper_bgcolor: 'rgba(15,20,55,.95)',
          plot_bgcolor:  'rgba(15,20,55,.95)',
          font: { color:'#a8b7d1', family:'JetBrains Mono', size:11 },
          xaxis: { gridcolor:'rgba(0,217,255,.12)', zerolinecolor:'rgba(0,217,255,.4)', zerolinewidth:1.5,
                   title:{text:'x',font:{color:'#00d9ff'}}, tickfont:{color:'#6b7a94'} },
          yaxis: { gridcolor:'rgba(0,217,255,.12)', zerolinecolor:'rgba(0,217,255,.4)', zerolinewidth:1.5,
                   title:{text:'f(x)',font:{color:'#00d9ff'}}, tickfont:{color:'#6b7a94'} },
          margin: { l:55, r:20, t:40, b:50 },
          title:  { text:`f(x) = ${expr}`, font:{color:'#f8fafc',size:14}, x:0.5 }
        },
        { responsive:true, displaylogo:false }
      );
    }
    if (r.analysis) showResult('g-result', fmt(r.analysis));
  } catch(e) {
    showResult('g-result', `<span style="color:var(--danger)">⚠️ ${escH(e.message)}</span>`, true);
  } finally { setBtn('g-btn', false, 'Plot & Analyse'); }
}

/* ── PYQs ── */
async function loadPYQs() {
  setBtn('pyq-load-btn', true, 'Loading PYQs…');
  try {
    const r = await api('/api/pyq/load', {
      exam:  V('pyq-exam')  || 'jam',
      count: V('pyq-count') || '10'
    });
    if (!r.success) throw new Error(r.error || 'Failed to load PYQs');

    // Split on "**Question" boundaries
    pyqList = r.questions.split(/\n(?=\*\*Question \d)/g).filter(q => q.trim().length > 20);
    pyqIdx  = 0;

    if (pyqList.length === 0) { toast('No questions found', 'err'); return; }

    document.getElementById('pyq-container').style.display = 'block';
    displayPYQ(0);
    toast(`Loaded ${pyqList.length} questions`, 'ok');
  } catch(e) {
    toast(e.message, 'err');
  } finally { setBtn('pyq-load-btn', false, 'Load PYQs'); }
}

function displayPYQ(idx) {
  if (idx >= pyqList.length) {
    document.getElementById('pyq-content').innerHTML = '<em style="color:var(--acc-t)">✓ All questions completed!</em>';
    document.getElementById('pyq-solution').style.display = 'none';
    return;
  }
  pyqIdx = idx;
  document.getElementById('pyq-progress').textContent = `Question ${idx+1} / ${pyqList.length}`;
  const box = document.getElementById('pyq-content');
  box.innerHTML = fmt(pyqList[idx]);
  document.getElementById('pyq-solution').style.display = 'none';
  setTimeout(() => renderMath(box), 100);
}

async function solvePYQ() {
  if (pyqIdx >= pyqList.length) return;
  setBtn('pyq-solve-btn', true, 'Solving…');
  const sol = document.getElementById('pyq-solution');
  sol.innerHTML = '<span class="spin"></span> Thinking…';
  sol.style.display = 'block';
  try {
    const r = await api('/api/chat', {
      messages: [{ role:'user', content:`Solve this exam question step-by-step:\n\n${pyqList[pyqIdx]}` }]
    });
    sol.innerHTML = fmt(r.answer || 'No solution.');
    setTimeout(() => { renderMath(sol); sol.scrollIntoView({ behavior:'smooth', block:'nearest' }); }, 100);
  } catch(e) {
    sol.innerHTML = `<span style="color:var(--danger)">⚠️ ${escH(e.message)}</span>`;
  } finally { setBtn('pyq-solve-btn', false, 'Ask Anupam to Solve'); }
}

function nextPYQ() {
  if (pyqIdx + 1 < pyqList.length) displayPYQ(pyqIdx + 1);
  else toast('All questions completed!', 'ok');
}

function buildMathCard(r) {
  if (!r) return '<p style="color:var(--danger)">No data returned.</p>';

  // If backend returned plain text (fallback), just fmt it
  if (!r.name && r.biography && r.biography.length > 200) {
    return `<div style="line-height:1.9;color:var(--tx-s)">${fmt(r.biography)}</div>`;
  }

  const fields   = Array.isArray(r.fields)                ? r.fields   : [];
  const contribs = Array.isArray(r.major_contributions)   ? r.major_contributions : [];
  const res      = Array.isArray(r.learning_resources)    ? r.learning_resources  : [];

  let h = `<div style="border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:14px">`;
  h += `<div style="font-family:var(--font-d);font-size:17px;font-weight:700;color:var(--tx-p);margin-bottom:8px">${escH(r.name||'Unknown')}</div>`;
  if (r.period)  h += `<span style="background:rgba(0,217,255,.12);border:1px solid rgba(0,217,255,.3);color:var(--acc-p);padding:3px 12px;border-radius:20px;font-size:11px;margin-right:6px">${escH(r.period)}</span>`;
  if (r.country) h += `<span style="background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);color:#a78bfa;padding:3px 12px;border-radius:20px;font-size:11px">${escH(r.country)}</span>`;
  if (fields.length) h += `<div style="font-size:11px;color:var(--acc-t);margin-top:8px">${fields.map(escH).join(' · ')}</div>`;
  h += `</div>`;

  if (r.biography) {
    h += `<div style="margin-bottom:14px"><div style="font-size:9px;letter-spacing:1.5px;color:var(--tx-t);margin-bottom:6px;text-transform:uppercase">Biography</div>`;
    h += `<div style="color:var(--tx-s);line-height:1.9;font-size:13px">${fmt(r.biography)}</div></div>`;
  }

  if (r.famous_quote) {
    h += `<div style="background:rgba(212,165,116,.07);border-left:3px solid var(--gold);padding:12px 16px;border-radius:0 8px 8px 0;margin:14px 0;font-style:italic;color:var(--gold);font-size:13px">"${escH(r.famous_quote)}"</div>`;
  }

  if (contribs.length) {
    h += `<div style="margin-bottom:14px"><div style="font-size:9px;letter-spacing:1.5px;color:var(--tx-t);margin-bottom:8px;text-transform:uppercase">Major Contributions</div>`;
    h += contribs.map(c => `<div style="display:flex;gap:8px;color:var(--tx-s);font-size:13px;margin-bottom:5px"><span style="color:var(--acc-p)">▸</span><span>${fmt(c)}</span></div>`).join('');
    h += `</div>`;
  }

  if (r.impact_today) {
    h += `<div style="margin-bottom:14px"><div style="font-size:9px;letter-spacing:1.5px;color:var(--tx-t);margin-bottom:6px;text-transform:uppercase">Impact Today</div>`;
    h += `<div style="color:var(--tx-s);font-size:13px;line-height:1.8">${fmt(r.impact_today)}</div></div>`;
  }

  if (res.length) {
    h += `<div><div style="font-size:9px;letter-spacing:1.5px;color:var(--tx-t);margin-bottom:8px;text-transform:uppercase">Learning Resources</div>`;
    h += res.map(r2 => `<div style="color:var(--tx-s);font-size:12px;margin-bottom:4px">📖 ${escH(r2)}</div>`).join('');
    h += `</div>`;
  }

  return h;
}

  const dc = { 'Beginner':'#06f7d6', 'Intermediate':'#00d9ff', 'Advanced':'#a78bfa' }[p.difficulty] || '#00d9ff';
  const concepts = Array.isArray(p.math_concepts) ? p.math_concepts : [];
  const steps    = Array.isArray(p.step_by_step)   ? p.step_by_step  : [];

  return `<div style="background:rgba(0,217,255,.04);border:1px solid rgba(0,217,255,.16);border-radius:12px;padding:20px;margin-bottom:20px;position:relative">
  <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc-p),var(--acc-s),var(--acc-t));border-radius:12px 12px 0 0"></div>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
    <div>
      <div style="font-size:9px;color:var(--tx-t);letter-spacing:1.5px;text-transform:uppercase">PROJECT ${i+1}</div>
      <div style="font-family:var(--font-d);font-size:16px;font-weight:700;color:var(--tx-p)">${escH(p.title||'')}</div>
    </div>
    <span style="color:${dc};background:rgba(0,217,255,.08);border:1px solid ${dc}55;padding:3px 12px;border-radius:20px;font-size:11px;white-space:nowrap">${escH(p.difficulty||'')}</span>
  </div>
  <div style="color:var(--tx-s);font-size:13px;line-height:1.8;margin-bottom:12px">${escH(p.description||'')}</div>
  ${concepts.length ? `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">${concepts.map(c=>`<span style="background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.25);color:#a78bfa;padding:3px 9px;border-radius:6px;font-size:11px">${escH(c)}</span>`).join('')}</div>` : ''}
  ${steps.length ? `<div style="margin-bottom:12px">${steps.map((s,si)=>`<div style="display:flex;gap:10px;margin-bottom:7px"><span style="background:linear-gradient(135deg,var(--acc-p),var(--acc-s));color:white;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${si+1}</span><span style="color:var(--tx-s);font-size:12.5px">${escH(s)}</span></div>`).join('')}</div>` : ''}
  ${p.code_snippet ? `<pre style="background:rgba(0,0,0,.45);border:1px solid rgba(0,217,255,.14);border-radius:8px;padding:12px;font-family:var(--font-m);font-size:11px;color:var(--acc-t);overflow-x:auto;margin-bottom:10px">${escH(p.code_snippet)}</pre>` : ''}
  </div>`;
}

/* ══════════════════════════════════════════════════════════
   CHAT (Ask Anupam)
══════════════════════════════════════════════════════════ */
async function sendMsg() {
  // If not in 'ask' mode, map Enter to the current panel's input
  if (mode !== 'ask') { handlePanelEnter(); return; }

  const inp  = document.getElementById('input');
  const text = inp.value.trim();
  if ((!text && !imgB64) || busy) return;

  document.getElementById('welcome')?.remove();

  const displayText = text || '📸 Image uploaded';
  addMsg('user', displayText);
  inp.value = ''; inp.style.height = 'auto';

  const ci = imgB64, ct = imgType;
  removeImg();

  // Build payload
  chatHistory.push({ role: 'user', content: text || 'Please solve the image.' });
  if (chatHistory.length > 30) chatHistory = chatHistory.slice(-30);
  savePrefs();

  showTyping();
  busy = true;

  try {
    const payload = { messages: chatHistory };
    if (ci) { payload.image_b64 = ci; payload.image_type = ct; }

    const r    = await api('/api/chat', payload);
    const ans  = r.answer || '⚠️ No response received.';

    chatHistory.push({ role: 'assistant', content: ans });
    if (chatHistory.length > 30) chatHistory = chatHistory.slice(-30);
    savePrefs();

    hideTyping();
    addMsg('bot', ans);
  } catch(e) {
    hideTyping();
    addMsg('bot', `⚠️ Error: ${e.message}`);
  }
}

function handlePanelEnter() {
  const val = document.getElementById('input').value.trim();
  if (!val) return;
  document.getElementById('input').value = '';
  const run = {
    formula:       () => { document.getElementById('f-topic').value = val; runFormula(); },
    graph:         () => { document.getElementById('g-expr').value  = val; runGraph();   },
    mathematician: () => { document.getElementById('m-name').value  = val; runMathematician(); },
    theorem:       () => { document.getElementById('t-name').value  = val; runTheorem();  },
    projects:      () => { document.getElementById('p-topic').value = val; runProjects(); },
    research:      () => { document.getElementById('r-query').value = val; runResearch(); },
  };
  if (run[mode]) run[mode]();
}

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;
  const av = role === 'bot' ? logoImg(34, 8) : '👤';
  div.innerHTML = `<div class="avatar">${av}</div><div class="bubble"></div>`;
  div.querySelector('.bubble').innerHTML = fmt(text);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  requestAnimationFrame(() => {
    renderMath(div.querySelector('.bubble'));
    chat.scrollTop = chat.scrollHeight;
  });
}

function showTyping() {
  document.getElementById('send-btn').disabled = true;
  const chat = document.getElementById('chat');
  const div  = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing-ind';
  div.innerHTML = `<div class="avatar">${logoImg(34, 8)}</div><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping() {
  busy = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('typing-ind')?.remove();
}

/* ══════════════════════════════════════════════════════════
   IMAGE UPLOAD
══════════════════════════════════════════════════════════ */
function handleImg(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (mode !== 'ask') { toast('Image upload only in Ask Anupam', 'info'); return; }
  if (file.size > 10 * 1024 * 1024) { toast('Image too large (max 10MB)', 'err'); return; }
  const reader = new FileReader();
  reader.onload = ev => {
    const result = ev.target.result;
    imgB64 = result.split(',')[1];
    imgType = file.type;
    document.getElementById('prev-img').src = result;
    document.getElementById('imgpreview').style.display = 'block';
    toast('Image ready — press Send', 'ok');
  };
  reader.onerror = () => toast('Failed to read image', 'err');
  reader.readAsDataURL(file);
}

function removeImg() {
  imgB64 = null; imgType = null;
  document.getElementById('imgpreview').style.display = 'none';
  document.getElementById('filein').value = '';
}
</script>
