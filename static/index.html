<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>MathSphere v11.0 — Mathematics AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.26.0/plotly.min.js"></script>
<style>
:root{
  --bg-deep:#0a0e27;--bg-main:#0f1437;--bg-light:#14194f;
  --acc-p:#00d9ff;--acc-s:#7c3aed;--acc-t:#06f7d6;
  --tx-p:#f8fafc;--tx-s:#a8b7d1;--tx-t:#6b7a94;
  --gold:#d4a574;--danger:#ff6b6b;--success:#22c55e;
  --sb-bg:rgba(10,14,39,.97);--tb-bg:rgba(10,14,39,.85);
  --inp-bg:rgba(20,25,79,.7);--card-bg:rgba(0,217,255,.06);
  --res-bg:rgba(0,0,0,.3);--border:rgba(0,217,255,.2);
  --font-d:'Playfair Display',serif;--font-b:'Poppins',sans-serif;--font-m:'JetBrains Mono',monospace;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;position:fixed;overflow:hidden;}
body{background:linear-gradient(135deg,var(--bg-deep),#1a1f4b);color:var(--tx-p);font-family:var(--font-b);font-size:14px;line-height:1.65;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(circle at 20% 80%,rgba(0,217,255,.12),transparent 50%),
             radial-gradient(circle at 80% 20%,rgba(124,58,237,.08),transparent 50%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(0deg,transparent 24%,rgba(0,217,255,.03) 25%,rgba(0,217,255,.03) 26%,transparent 27%),
                   linear-gradient(90deg,transparent 24%,rgba(0,217,255,.03) 25%,rgba(0,217,255,.03) 26%,transparent 27%);
  background-size:60px 60px;opacity:.5;}
#app{position:relative;z-index:1;display:flex;height:100%;width:100%;overflow:hidden;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* SIDEBAR */
#sidebar{width:262px;flex-shrink:0;background:var(--sb-bg);backdrop-filter:blur(20px);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  overflow:hidden;transition:transform .3s ease;z-index:200;}
.logo-wrap{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(0,217,255,.04),rgba(124,58,237,.04));}
.logo-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--acc-p),var(--acc-s));
  font-size:20px;box-shadow:0 0 25px rgba(0,217,255,.35);flex-shrink:0;}
.logo-name{font-family:var(--font-d);font-size:16px;font-weight:800;
  background:linear-gradient(135deg,var(--tx-p),var(--acc-p));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.logo-ver{font-size:10px;color:var(--tx-t);font-family:var(--font-m);letter-spacing:1px;}
.sb-scroll{flex:1;overflow-y:auto;padding:6px;scrollbar-width:thin;scrollbar-color:rgba(0,217,255,.2) transparent;}
.sb-scroll::-webkit-scrollbar{width:3px;}.sb-scroll::-webkit-scrollbar-thumb{background:rgba(0,217,255,.25);border-radius:2px;}
.sb-section{padding:10px 10px 3px;font-size:9px;color:var(--tx-t);font-family:var(--font-m);
  letter-spacing:2px;text-transform:uppercase;}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border:none;
  background:transparent;color:var(--tx-s);cursor:pointer;border-radius:7px;
  font-family:var(--font-b);font-size:12.5px;font-weight:500;transition:all .2s;
  text-align:left;margin:1px 0;position:relative;}
.nav-btn:hover{color:var(--tx-p);background:rgba(0,217,255,.07);transform:translateX(2px);}
.nav-btn.active{background:linear-gradient(90deg,rgba(0,217,255,.12),rgba(0,217,255,.04));
  color:var(--acc-p);border:1px solid rgba(0,217,255,.25);}
.nav-btn .em{font-size:14px;}

/* TOPBAR */
#topbar{display:flex;align-items:center;gap:10px;padding:11px 18px;
  padding-top:calc(11px + var(--safe-t));border-bottom:1px solid var(--border);
  background:var(--tb-bg);backdrop-filter:blur(20px);flex-shrink:0;}
#hamburger{display:none;background:rgba(0,217,255,.08);border:1px solid rgba(0,217,255,.2);
  color:var(--tx-s);width:34px;height:34px;border-radius:7px;cursor:pointer;
  align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .2s;}
#hamburger:hover{background:rgba(0,217,255,.18);color:var(--acc-p);}
#mode-title{font-family:var(--font-d);font-weight:700;font-size:16px;
  background:linear-gradient(135deg,var(--tx-p),var(--acc-p));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--acc-t);
  box-shadow:0 0 10px var(--acc-t);animation:pulse 2s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.7}}
.topbar-btn{background:rgba(0,217,255,.07);border:1px solid rgba(0,217,255,.2);
  color:var(--tx-s);padding:5px 11px;border-radius:6px;font-family:var(--font-m);
  font-size:10px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.topbar-btn:hover{background:rgba(0,217,255,.15);border-color:var(--acc-p);color:var(--acc-p);}

/* CHAT AREA */
#chat-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:18px;
  display:flex;flex-direction:column;gap:14px;
  scrollbar-width:thin;scrollbar-color:rgba(0,217,255,.15) transparent;}
#chat-area::-webkit-scrollbar{width:4px;}#chat-area::-webkit-scrollbar-thumb{background:rgba(0,217,255,.2);border-radius:2px;}

/* MESSAGES */
.msg{display:flex;gap:9px;animation:msgIn .3s cubic-bezier(.4,0,.2,1);}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.msg.user .avatar{background:linear-gradient(135deg,#1a2d5c,#2a1f4f);border:1px solid rgba(124,58,237,.3);}
.msg.bot .avatar{background:linear-gradient(135deg,var(--acc-p),var(--acc-s));box-shadow:0 0 12px rgba(0,217,255,.3);}
.bubble{max-width:82%;padding:12px 15px;border-radius:13px;font-size:13.5px;line-height:1.9;
  overflow-wrap:break-word;word-break:break-word;min-width:0;backdrop-filter:blur(8px);}
.msg.user .bubble{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(0,217,255,.07));
  border:1px solid rgba(124,58,237,.2);border-top-right-radius:3px;}
.msg.bot .bubble{background:linear-gradient(135deg,rgba(0,217,255,.06),rgba(20,25,79,.45));
  border:1px solid rgba(0,217,255,.16);border-top-left-radius:3px;position:relative;}
.msg.bot .bubble::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,var(--acc-p),var(--acc-s),var(--acc-t),transparent);
  border-radius:13px 13px 0 0;opacity:.4;}
.bubble code{font-family:var(--font-m);font-size:11px;background:rgba(0,0,0,.4);padding:2px 5px;border-radius:4px;color:var(--acc-t);}
.bubble pre{background:rgba(0,0,0,.5);border:1px solid rgba(0,217,255,.15);border-radius:7px;
  padding:11px;margin:7px 0;overflow-x:auto;font-family:var(--font-m);font-size:11px;
  line-height:1.6;color:var(--acc-t);white-space:pre-wrap;}
.bubble h2,.bubble h3{font-family:var(--font-d);color:var(--acc-p);margin:9px 0 3px;}
.bubble strong{color:var(--tx-p);}
.bubble em{color:var(--gold);}
.bubble ul,.bubble ol{padding-left:18px;margin:4px 0;}
.bubble li{margin:2px 0;}

/* INPUT AREA */
#inputarea{padding:10px 18px;padding-bottom:calc(10px + var(--safe-b));border-top:1px solid var(--border);
  background:var(--tb-bg);backdrop-filter:blur(20px);flex-shrink:0;}
.inp-outer{display:flex;flex-direction:column;gap:6px;}
.inp-wrap{display:flex;gap:7px;align-items:flex-end;background:var(--inp-bg);
  border:1px solid rgba(0,217,255,.2);border-radius:11px;padding:8px 9px 8px 13px;
  transition:all .25s;}
.inp-wrap:focus-within{border-color:var(--acc-p);box-shadow:0 4px 25px rgba(0,217,255,.1);}
#input{flex:1;background:none;border:none;outline:none;color:var(--tx-p);
  font-family:var(--font-b);font-size:14px;line-height:1.6;resize:none;
  max-height:120px;min-height:24px;font-weight:500;}
#input::placeholder{color:var(--tx-t);}
.inp-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.iico{width:32px;height:32px;background:rgba(0,217,255,.07);border:1px solid rgba(0,217,255,.18);
  border-radius:6px;color:var(--tx-t);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0;}
.iico:hover{background:rgba(0,217,255,.16);border-color:var(--acc-p);color:var(--acc-p);}
.iico.active{background:rgba(6,247,214,.15);border-color:var(--acc-t);color:var(--acc-t);}
#send-btn{width:32px;height:32px;background:linear-gradient(135deg,var(--acc-p),var(--acc-s));
  border:none;border-radius:6px;color:white;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;box-shadow:0 3px 12px rgba(0,217,255,.3);transition:all .25s;}
#send-btn:hover:not(:disabled){transform:scale(1.1) rotate(6deg);box-shadow:0 6px 22px rgba(0,217,255,.5);}
#send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
#img-preview{display:none;padding:6px 10px;background:rgba(0,217,255,.07);border-radius:8px;
  border:1px solid rgba(0,217,255,.2);font-size:11px;color:var(--tx-s);
  font-family:var(--font-m);align-items:center;gap:8px;}
#img-preview.show{display:flex;}
#img-preview img{width:32px;height:32px;object-fit:cover;border-radius:4px;border:1px solid rgba(0,217,255,.3);}
.inp-hint{text-align:center;font-size:10px;color:var(--tx-t);font-family:var(--font-m);}

/* TYPING */
.typing{display:flex;gap:5px;padding:11px 13px;background:rgba(0,217,255,.06);
  border:1px solid rgba(0,217,255,.16);border-radius:13px;border-top-left-radius:3px;width:fit-content;}
.td{width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,var(--acc-p),var(--acc-s));animation:bounce 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-8px);opacity:1}}

/* WELCOME */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:24px 18px;text-align:center;animation:fadeUp .5s ease;overflow-y:auto;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.big-icon{width:82px;height:82px;border-radius:20px;display:flex;align-items:center;justify-content:center;
  font-size:36px;box-shadow:0 18px 45px rgba(0,217,255,.35);
  animation:iconFloat 4s ease-in-out infinite;margin-bottom:18px;
  background:linear-gradient(135deg,var(--acc-p),var(--acc-s));}
@keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#welcome h1{font-family:var(--font-d);font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px;
  background:linear-gradient(135deg,var(--tx-p),var(--acc-p));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
#welcome p{color:var(--tx-s);max-width:440px;font-size:13px;line-height:1.75;margin-bottom:20px;}
.feat-grid{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:540px;}
.feat{background:rgba(0,217,255,.07);border:1px solid rgba(0,217,255,.16);border-radius:7px;
  padding:6px 12px;font-size:11px;color:var(--tx-s);font-family:var(--font-m);}

/* PANELS */
#panel-area{flex:1;overflow-y:auto;padding:16px;
  scrollbar-width:thin;scrollbar-color:rgba(0,217,255,.15) transparent;}
#panel-area::-webkit-scrollbar{width:4px;}#panel-area::-webkit-scrollbar-thumb{background:rgba(0,217,255,.2);border-radius:2px;}
.panel-card{background:linear-gradient(135deg,rgba(0,217,255,.05),rgba(124,58,237,.04));
  border:1px solid rgba(0,217,255,.16);border-radius:13px;padding:20px;
  animation:fadeUp .3s ease;max-width:860px;margin:0 auto;}
.panel-title{font-family:var(--font-d);font-weight:700;font-size:16px;color:var(--tx-p);margin-bottom:3px;}
.panel-sub{font-size:11px;color:var(--tx-t);font-family:var(--font-m);margin-bottom:14px;}
.form-row{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:130px;}
.form-label{font-size:10px;color:var(--tx-t);font-family:var(--font-m);letter-spacing:1px;text-transform:uppercase;}
.form-input,.form-select{background:rgba(20,25,79,.8);border:1px solid rgba(0,217,255,.18);
  color:var(--tx-p);border-radius:7px;padding:8px 11px;font-family:var(--font-b);font-size:13px;outline:none;transition:all .2s;}
.form-input:focus,.form-select:focus{border-color:var(--acc-p);box-shadow:0 0 10px rgba(0,217,255,.1);}
.form-select option{background:var(--bg-main);color:var(--tx-p);}
.action-btn{background:linear-gradient(135deg,var(--acc-p),var(--acc-s));border:none;color:white;
  padding:10px 22px;border-radius:8px;font-family:var(--font-b);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .25s;box-shadow:0 3px 14px rgba(0,217,255,.28);}
.action-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 7px 22px rgba(0,217,255,.42);}
.action-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.sec-btn{background:rgba(0,217,255,.07);border:1px solid rgba(0,217,255,.18);color:var(--tx-s);
  padding:10px 18px;border-radius:8px;font-family:var(--font-b);font-size:13px;cursor:pointer;transition:all .2s;}
.sec-btn:hover:not(:disabled){background:rgba(0,217,255,.14);color:var(--acc-p);}
.sec-btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:10px;}
.result-box{background:var(--res-bg);border:1px solid rgba(0,217,255,.13);border-radius:9px;
  padding:16px;margin-top:12px;line-height:1.9;font-size:13.5px;color:var(--tx-p);
  overflow-wrap:break-word;max-height:65vh;overflow-y:auto;scrollbar-width:thin;display:none;}
.result-box.show{display:block;}
.result-box::-webkit-scrollbar{width:3px;}.result-box::-webkit-scrollbar-thumb{background:rgba(0,217,255,.18);border-radius:2px;}
.graph-box{background:rgba(0,0,0,.35);border:1px solid rgba(0,217,255,.16);border-radius:9px;
  padding:8px;margin-top:10px;height:360px;display:none;}
.graph-box.show{display:block;}

/* PYQ / QUIZ SPECIFIC */
.pyq-card{background:rgba(0,217,255,.04);border-left:3px solid var(--acc-p);
  padding:15px;margin:10px 0;border-radius:0 8px 8px 0;line-height:2;}
.pyq-meta{font-size:11px;color:var(--tx-t);margin-bottom:8px;font-family:var(--font-m);display:flex;gap:6px;flex-wrap:wrap;}
.badge{background:rgba(0,217,255,.12);color:var(--acc-p);padding:2px 8px;border-radius:4px;white-space:nowrap;}
.badge.diff-easy{background:rgba(34,197,94,.12);color:#22c55e;}
.badge.diff-moderate{background:rgba(234,179,8,.12);color:#eab308;}
.badge.diff-difficult{background:rgba(255,107,107,.12);color:#ff6b6b;}
.opt-list{list-style:none;margin:10px 0;display:flex;flex-direction:column;gap:6px;}
.opt-item{padding:8px 12px;border-radius:7px;border:1px solid rgba(0,217,255,.15);
  cursor:pointer;transition:all .2s;font-size:13px;}
.opt-item:hover{background:rgba(0,217,255,.09);border-color:var(--acc-p);}
.opt-item.selected{background:rgba(0,217,255,.12);border-color:var(--acc-p);color:var(--acc-p);}
.opt-item.correct{background:rgba(34,197,94,.12);border-color:#22c55e;color:#22c55e;}
.opt-item.wrong{background:rgba(255,107,107,.1);border-color:#ff6b6b;color:#ff6b6b;}
.solution-box{background:rgba(6,247,214,.05);border:1px solid rgba(6,247,214,.2);
  border-radius:8px;padding:14px;margin-top:10px;display:none;}
.solution-box.show{display:block;}

/* MOCK TEST */
.test-timer{font-family:var(--font-m);font-size:28px;font-weight:700;color:var(--acc-p);
  text-align:center;padding:12px;letter-spacing:2px;}
.test-timer.warning{color:#eab308;}
.test-timer.danger{color:var(--danger);animation:blinkTimer 1s ease-in-out infinite;}
@keyframes blinkTimer{50%{opacity:.4}}
.progress-bar{height:4px;background:rgba(0,217,255,.15);border-radius:2px;margin:8px 0;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc-p),var(--acc-s));
  border-radius:2px;transition:width .3s ease;}
.score-display{text-align:center;padding:20px;border-radius:12px;
  background:linear-gradient(135deg,rgba(0,217,255,.08),rgba(124,58,237,.08));
  border:1px solid rgba(0,217,255,.2);}
.score-number{font-family:var(--font-d);font-size:48px;font-weight:800;color:var(--acc-p);}
.score-label{font-size:12px;color:var(--tx-t);font-family:var(--font-m);}
.grade-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;
  font-weight:600;margin-top:6px;background:linear-gradient(135deg,var(--acc-p),var(--acc-s));color:white;}

/* TOAST */
.toast{position:fixed;top:16px;right:16px;padding:10px 15px;border-radius:8px;
  font-size:12px;z-index:9999;font-family:var(--font-m);
  animation:toastIn .3s ease;backdrop-filter:blur(10px);border:1px solid;max-width:280px;}
@keyframes toastIn{from{opacity:0;transform:translateX(70px)}to{opacity:1;transform:translateX(0)}}
.toast.ok{background:rgba(6,247,214,.1);border-color:rgba(6,247,214,.3);color:var(--acc-t);}
.toast.info{background:rgba(0,217,255,.1);border-color:rgba(0,217,255,.3);color:var(--acc-p);}
.toast.err{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.3);color:#ff6b6b;}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);
  border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
.katex{color:var(--tx-p)!important;}
.katex-display{margin:8px 0;overflow-x:auto;}

/* SIDEBAR OVERLAY (mobile) */
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;backdrop-filter:blur(3px);}

@media(max-width:700px){
  #sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);width:260px;
    box-shadow:5px 0 30px rgba(0,217,255,.2);}
  #sidebar.open{transform:translateX(0);}
  #sb-overlay.show{display:block;}
  #hamburger{display:flex;}
  #chat-area{padding:10px;}
  #inputarea{padding:8px 10px;padding-bottom:calc(8px + var(--safe-b));}
  .bubble{max-width:90%;}
  .panel-card{padding:14px;}
  .graph-box{height:260px;}
  #welcome h1{font-size:22px;}.big-icon{width:68px;height:68px;font-size:28px;}
}
</style>
</head>
<body>

<!-- Sidebar overlay for mobile -->
<div id="sb-overlay" onclick="closeSidebar()"></div>

<div id="app">
  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="logo-wrap">
      <div class="logo-icon">∑</div>
      <div>

// ════════════════════════════════════════════════════════════
// FIX: LaTeX-safe formatter
// Previously: fmt() escaped HTML BEFORE restoring LaTeX, corrupting < > inside math
// ════════════════════════════════════════════════════════════
function fmt(raw) {
  if (!raw) return '';
  let t = String(raw);

  // 1. Extract and protect LaTeX BEFORE any HTML escaping
  const latexBlocks = [];
  const protectLatex = (match) => {
    latexBlocks.push(match);
    return `\x00LATEX${latexBlocks.length - 1}\x00`;
  };

  // Display math first (longer patterns)
  t = t.replace(/\\\[[\s\S]*?\\\]/g, protectLatex);
  t = t.replace(/\$\$[\s\S]*?\$\$/g, protectLatex);
  // Inline math
  t = t.replace(/\\\([\s\S]*?\\\)/g, protectLatex);
  t = t.replace(/\$[^\$\n]{1,300}?\$/g, protectLatex);

  // 2. HTML escape the NON-LaTeX parts
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // 3. Restore LaTeX blocks (unescaped)
  t = t.replace(/\x00LATEX(\d+)\x00/g, (_, i) => latexBlocks[+i]);

  // 4. Markdown formatting
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre>$1</pre>');
  t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  // FIX: convert newlines AFTER all other replacements
  t = t.replace(/\n/g, '<br>');

  return t;
}

// ════════════════════════════════════════════════════════════
// FIX: renderMath waits for KaTeX to be ready
// ════════════════════════════════════════════════════════════
function renderMath(el) {
  if (!el) return;
  const doRender = () => {
    try {
      renderMathInElement(el, {
        delimiters: [
          { left: '\\[', right: '\\]', display: true },
          { left: '\\(', right: '\\)', display: false },
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false },
        ],
        throwOnError: false,
        strict: false,
      });
    } catch(e) { /* silently ignore */ }
  };

  if (typeof renderMathInElement !== 'undefined') {
    doRender();
  } else {
    // KaTeX not yet loaded — retry after short delay
    setTimeout(() => {
      if (typeof renderMathInElement !== 'undefined') doRender();
    }, 500);
  }
}

function handleKey(e) {

function toast(msg, type = 'ok') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(70px)'; t.style.transition = '.3s'; setTimeout(() => t.remove(), 300); }, 2800);
}

function setBtn(id, loading, label) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = loading;
  if (loading) {
    btn.innerHTML = `<span class="spinner"></span>${label}`;
  } else {
    btn.textContent = label;
  }
}

function showResult(id, html, show = true) {
  const box = document.getElementById(id);
  if (!box) return;
  box.innerHTML = html;
  if (show) box.classList.add('show');
  else box.classList.remove('show');

}

function scrollChat() {
  const ca = document.getElementById('chat-area');

}

async function apiFetch(url, payload) {
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

// IMAGE UPLOAD  (FIX: was entirely missing from frontend)
// ════════════════════════════════════════════════════════════
function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  if (!file.type.startsWith('image/')) {
    toast('Please select an image file', 'err');
    return;
  }
  if (file.size > 10 * 1024 * 1024) {
    toast('Image too large (max 10MB)', 'err');
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    pendingImageB64 = e.target.result; // full data URI — backend strips header
    pendingImageType = file.type;

    // Show preview
    const preview = document.getElementById('img-preview');
    const thumb = document.getElementById('img-thumb');
    const nameEl = document.getElementById('img-name');
    thumb.src = pendingImageB64;
    nameEl.textContent = file.name.length > 28 ? file.name.slice(0, 25) + '…' : file.name;
    preview.classList.add('show');
    document.getElementById('img-label').classList.add('active');
    document.getElementById('input').placeholder = 'Ask about this image (or press Send to auto-analyze)…';
    toast('Image ready — ask your question or press Send', 'info');
  };
  reader.readAsDataURL(file);
  // Reset input so same file can be re-selected
  event.target.value = '';
}

function clearImage() {
  pendingImageB64 = null;
  pendingImageType = 'image/jpeg';
  document.getElementById('img-preview').classList.remove('show');
  document.getElementById('img-label').classList.remove('active');

// ════════════════════════════════════════════════════════════
// CHAT  (FIX: busy not reset on error; image support added)
// ════════════════════════════════════════════════════════════
async function sendMsg() {
  if (mode !== 'ask') return;
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  const hasImage = !!pendingImageB64;

  if (!text && !hasImage) return;
  if (busy) return;

  // Remove welcome screen
  document.getElementById('welcome')?.remove();

  const displayText = text || (hasImage ? '📷 Analyze this image' : '');
  addMsg('user', displayText);
  inp.value = '';
  inp.style.height = 'auto';

  // Prepare payload
  const payload = {
    messages: [...chatHistory, { role: 'user', content: displayText }]
  };
  if (hasImage) {
    payload.image_b64   = pendingImageB64;
    payload.image_type  = pendingImageType;
  }

  chatHistory.push({ role: 'user', content: displayText });
  if (chatHistory.length > 30) chatHistory = chatHistory.slice(-30);

  clearImage();
  showTyping();
  busy = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    hideTyping();

    if (!r.ok) throw new Error(data.error || `Server error ${r.status}`);

    const ans = data.answer || '⚠️ No response received';
    chatHistory.push({ role: 'assistant', content: ans });
    if (chatHistory.length > 30) chatHistory = chatHistory.slice(-30);
    addMsg('bot', ans);
  } catch(e) {
    hideTyping();
    addMsg('bot', `⚠️ **Error:** ${e.message}\n\nPlease check your API keys and try again.`);
  }
  // FIX: always reset busy, even on error
}

function addMsg(role, text) {
  const ca = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="avatar">${role === 'bot' ? '∑' : '👤'}</div><div class="bubble"></div>`;
  const bubble = div.querySelector('.bubble');
  bubble.innerHTML = fmt(text);
  ca.appendChild(div);
  scrollChat();
  requestAnimationFrame(() => { renderMath(bubble); scrollChat(); });
}

function showTyping() {
  const ca = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing-ind';
  div.innerHTML = `<div class="avatar">∑</div><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  ca.appendChild(div);
  scrollChat();
}

function hideTyping() {
  busy = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('typing-ind')?.remove();
}

// GRAPH PLOTTER  (FIX: null-y handling for Plotly)
// ════════════════════════════════════════════════════════════
async function runGraph() {
  const expr = V('g-expr') || 'x**2';
  const xMin = parseFloat(V('g-xmin') || '-10');
  const xMax = parseFloat(V('g-xmax') || '10');
  const pts  = parseInt(V('g-pts') || '600');

  if (isNaN(xMin) || isNaN(xMax) || xMin >= xMax) {
    toast('Invalid x range', 'err'); return;
  }

  setBtn('g-btn', true, 'Computing…');
  try {
    const data = await apiFetch('/api/graph', { expression: expr, x_min: xMin, x_max: xMax, points: pts });
    if (!data.success) throw new Error(data.error || 'Plotting failed');

    // FIX: Split points at nulls to avoid lines across discontinuities
    const allPts = data.points || [];
    const traces = [];
    let segX = [], segY = [];

    for (const p of allPts) {
      if (p.y === null || p.y === undefined) {
        if (segX.length > 1) traces.push({ x: [...segX], y: [...segY] });
        segX = []; segY = [];
      } else {
        segX.push(p.x); segY.push(p.y);
      }
    }
    if (segX.length > 1) traces.push({ x: segX, y: segY });

    const plotTraces = traces.map((seg, i) => ({
      x: seg.x, y: seg.y, type: 'scatter', mode: 'lines',
      line: { color: i === 0 ? '#00d9ff' : '#7c3aed', width: 2.2 },
      showlegend: false
    }));

    const pb = document.getElementById('g-plotbox');
    pb.classList.add('show');

    Plotly.newPlot(pb, plotTraces, {
      paper_bgcolor: 'rgba(15,20,55,.98)',
      plot_bgcolor: 'rgba(15,20,55,.95)',
      font: { color: '#a8b7d1', family: 'Poppins', size: 11 },
      title: { text: `f(x) = ${expr}`, font: { color: '#f8fafc', size: 14 } },
      xaxis: { gridcolor: 'rgba(0,217,255,.1)', zerolinecolor: 'rgba(0,217,255,.3)', color: '#a8b7d1' },
      yaxis: { gridcolor: 'rgba(0,217,255,.1)', zerolinecolor: 'rgba(0,217,255,.3)', color: '#a8b7d1' },
      margin: { l: 50, r: 20, t: 45, b: 45 },
      hovermode: 'closest',
    }, { responsive: true, displaylogo: false,
         modeBarButtonsToRemove: ['lasso2d', 'select2d', 'toImage'] });

    showResult('g-result', fmt(data.analysis || 'Analysis unavailable'));

    if (data.warnings && data.warnings.length) toast(data.warnings[0], 'info');
    toast(`Plotted ${data.point_count || 0} points`, 'ok');

  } catch(e) {
    toast(e.message, 'err');
    showResult('g-result', `<span style="color:var(--danger)">⚠️ ${e.message}</span>`);
  } finally {
    setBtn('g-btn', false, 'Plot & Analyse');
  }
}

// PYQ  (FIX: proper MCQ rendering with option selection)
// ════════════════════════════════════════════════════════════
async function loadPYQs() {
  setBtn('pyq-btn', true, 'Loading…');
  pyqList = []; pyqIdx = 0; pyqUserAnswer = null;

  try {
    const data = await apiFetch('/api/pyq/load', {
      exam:       V('pyq-exam') || 'jam',
      difficulty: V('pyq-diff') || 'moderate',
      count:      parseInt(V('pyq-count') || '5')
    });
    if (!data.success) throw new Error(data.error);
    pyqList = data.questions || [];
    if (!pyqList.length) throw new Error('No questions returned');

    document.getElementById('pyq-area').style.display = 'block';
    document.getElementById('pyq-solution').classList.remove('show');
    displayPYQ(0);
    toast(`Loaded ${pyqList.length} questions`, 'ok');
  } catch(e) {
    toast(e.message, 'err');
  } finally {
    setBtn('pyq-btn', false, 'Load Questions');
  }
}

function displayPYQ(idx) {
  if (!pyqList.length || idx >= pyqList.length) return;
  pyqIdx = idx;
  pyqUserAnswer = null;
  const q = pyqList[idx];

  document.getElementById('pyq-progress').textContent =
    `Question ${idx + 1} / ${pyqList.length}  ·  ${q.topic || ''}  ·  ${q.year || ''}`;

  const diffClass = q.difficulty ? `diff-${q.difficulty}` : '';
  let html = `<div class="pyq-card">
    <div class="pyq-meta">
      ${q.year ? `<span class="badge">📅 ${q.year}</span>` : ''}
      ${q.source ? `<span class="badge">${q.source}</span>` : ''}
      ${q.topic ? `<span class="badge">${q.topic}</span>` : ''}
      ${q.difficulty ? `<span class="badge ${diffClass}">${q.difficulty}</span>` : ''}
    </div>
    <div style="font-size:14px;line-height:2;margin-bottom:12px">${q.question || 'Question not available'}</div>`;

  if (q.options && q.options.length) {
    html += `<ul class="opt-list" id="pyq-opts">`;
    q.options.forEach((opt, i) => {
      const letter = String.fromCharCode(65 + i);
      html += `<li class="opt-item" id="pyq-opt-${i}" onclick="selectPYQOption(${i}, '${letter}')">${opt}</li>`;
    });
    html += `</ul>`;
  }
  html += `</div>`;

  const content = document.getElementById('pyq-content');
  content.innerHTML = html;
  document.getElementById('pyq-solution').classList.remove('show');
  document.getElementById('pyq-solve-btn').textContent = '📝 Show Solution';

  setTimeout(() => renderMath(content), 100);

  // Update Next button
  const nextBtn = document.getElementById('pyq-next-btn');
  if (nextBtn) nextBtn.textContent = idx + 1 < pyqList.length ? 'Next →' : '✅ Done';
}

function selectPYQOption(i, letter) {
  pyqUserAnswer = letter;
  document.querySelectorAll('.opt-item').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById(`pyq-opt-${i}`);
  if (el) el.classList.add('selected');
}

async function solvePYQ() {
  if (!pyqList.length || pyqIdx >= pyqList.length) return;
  const q = pyqList[pyqIdx];
  const solBox = document.getElementById('pyq-solution');

  // First: reveal correct answer in options
  if (q.options && q.answer) {
    const correctLetter = q.answer.trim()[0].toUpperCase();
    const correctIdx = correctLetter.charCodeAt(0) - 65;
    q.options.forEach((_, i) => {
      const el = document.getElementById(`pyq-opt-${i}`);
      if (!el) return;
      if (i === correctIdx) el.classList.add('correct');
      else if (el.classList.contains('selected')) el.classList.add('wrong');
    });
  }

  // Show explanation
  const explanation = q.explanation || '';
  if (explanation) {
    solBox.innerHTML = `<strong style="color:var(--acc-t)">✅ Answer: ${q.answer}</strong><br><br>${fmt(explanation)}`;
    solBox.classList.add('show');
    setTimeout(() => renderMath(solBox), 80);
    setBtn('pyq-solve-btn', false, '📝 Show Solution');
    return;
  }

  // If no stored explanation, call AI
  setBtn('pyq-solve-btn', true, 'Solving…');
  solBox.innerHTML = '<span style="color:var(--acc-p)">⏳ Generating solution…</span>';
  solBox.classList.add('show');

  try {
    const prompt = `Solve this exam question with a complete step-by-step solution:\n\n${q.question}\n\nOptions: ${(q.options || []).join(', ')}\n\nExplain WHY the correct answer is ${q.answer || 'as given'} and why each other option is wrong.`;
    const data = await apiFetch('/api/chat', { message: prompt });
    solBox.innerHTML = fmt(data.answer || 'Solution unavailable');
    setTimeout(() => renderMath(solBox), 80);
  } catch(e) {
    solBox.innerHTML = `<span style="color:var(--danger)">⚠️ ${e.message}</span>`;
  } finally {
    setBtn('pyq-solve-btn', false, '📝 Show Solution');
  }
}

function nextPYQ() {
  if (pyqIdx + 1 < pyqList.length) {
    displayPYQ(pyqIdx + 1);
  } else {
    toast('🎉 All questions done!', 'ok');
  }
}

// MOCK TEST  (FIX: proper timed test with scoring)
// ════════════════════════════════════════════════════════════
async function startMockTest() {
  const exam  = V('mock-exam') || 'jam';
  const count = parseInt(V('mock-count') || '10');
  const dur   = parseInt(V('mock-dur') || '20');

  setBtn('mock-start-btn', true, 'Generating test…');
  mockUserAnswers = {};
  mockCurrentQ = 0;

  try {
    const data = await apiFetch('/api/mock/generate', {
      exam, count, timed: true, duration: dur
    });
    if (!data.success) throw new Error(data.error);

    mockTest      = data.test;
    mockAnswerKey = data.answer_key;
    mockTimeLeft  = data.test.duration_seconds;

    document.getElementById('mock-setup').style.display = 'none';
    document.getElementById('mock-test-area').style.display = 'block';

    renderMockQuestion(0);
    startMockTimer();
    toast('Test started! Good luck 🍀', 'ok');
  } catch(e) {
    toast(e.message, 'err');
  } finally {
    setBtn('mock-start-btn', false, '▶ Start Test');
  }
}

function renderMockQuestion(idx) {
  if (!mockTest || idx >= mockTest.questions.length) return;
  mockCurrentQ = idx;
  const q = mockTest.questions[idx];
  const total = mockTest.questions.length;
  const answered = Object.keys(mockUserAnswers).length;

  const pct = Math.round((answered / total) * 100);

  let html = `
    <div id="mock-timer-display" class="test-timer">${formatTime(mockTimeLeft)}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="font-size:11px;color:var(--tx-t);font-family:var(--font-m);margin-bottom:12px">
      Question ${idx+1}/${total} · ${answered} answered
      ${q.difficulty ? ` · <span class="badge diff-${q.difficulty}">${q.difficulty}</span>` : ''}
    </div>
    <div class="pyq-card">
      <div class="pyq-meta">
        ${q.topic ? `<span class="badge">${q.topic}</span>` : ''}
        ${q.year ? `<span class="badge">📅 ${q.year}</span>` : ''}
      </div>
      <div style="font-size:14px;line-height:2;margin-bottom:12px">${q.question || ''}</div>`;

  if (q.options && q.options.length) {
    html += `<ul class="opt-list">`;
    q.options.forEach((opt, i) => {
      const letter = String.fromCharCode(65 + i);
      const sel = mockUserAnswers[idx] === letter ? 'selected' : '';
      html += `<li class="opt-item ${sel}" onclick="selectMockOption(${idx},'${letter}',this)">${opt}</li>`;
    });
    html += `</ul>`;
  }
  html += `</div>
    <div class="btn-row">
      <button class="sec-btn" onclick="renderMockQuestion(${Math.max(0,idx-1)})" ${idx===0?'disabled':''}>← Prev</button>
      ${idx+1 < total
        ? `<button class="action-btn" onclick="renderMockQuestion(${idx+1})">Next →</button>`
        : `<button class="action-btn" style="background:linear-gradient(135deg,#22c55e,#16a34a)" onclick="submitMockTest()">✅ Submit Test</button>`}
    </div>
    <div style="margin-top:12px">
      <button class="sec-btn" style="width:100%;font-size:11px" onclick="submitMockTest()">Submit Test (${answered}/${total} answered)</button>
    </div>`;

  const area = document.getElementById('mock-test-area');
  area.innerHTML = html;
  setTimeout(() => renderMath(area), 100);
}

function selectMockOption(qIdx, letter, el) {
  mockUserAnswers[qIdx] = letter;
  // Update UI
  const opts = el.parentNode.querySelectorAll('.opt-item');
  opts.forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  // Update progress
  const total    = mockTest.questions.length;
  const answered = Object.keys(mockUserAnswers).length;
  const fill = document.querySelector('.progress-fill');
  if (fill) fill.style.width = Math.round((answered/total)*100) + '%';
}

function startMockTimer() {
  if (mockTimerInterval) clearInterval(mockTimerInterval);
  mockTimerInterval = setInterval(() => {
    mockTimeLeft--;
    const td = document.getElementById('mock-timer-display');
    if (td) {
      td.textContent = formatTime(mockTimeLeft);
      td.className = 'test-timer' + (mockTimeLeft < 300 ? ' warning' : '') + (mockTimeLeft < 60 ? ' danger' : '');
    }
    if (mockTimeLeft <= 0) {
      clearInterval(mockTimerInterval);
      toast("⏰ Time's up! Submitting…", 'info');
      submitMockTest();
    }
  }, 1000);
}

function formatTime(secs) {
  const m = Math.floor(Math.max(0, secs) / 60).toString().padStart(2,'0');
  const s = (Math.max(0, secs) % 60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

async function submitMockTest() {
  if (mockTimerInterval) { clearInterval(mockTimerInterval); mockTimerInterval = null; }

  const answers = Object.entries(mockUserAnswers).map(([idx, letter]) => ({
    index: parseInt(idx),
    selected_option: letter
  }));

  document.getElementById('mock-test-area').innerHTML =
    '<div style="text-align:center;padding:30px;color:var(--acc-p)"><span class="spinner"></span> Evaluating…</div>';

  try {
    const data = await apiFetch('/api/mock/evaluate', {
      answers,
      answer_key: mockAnswerKey,
      questions: mockTest.questions
    });

    if (!data.success) throw new Error(data.error);
    renderMockResult(data);
  } catch(e) {
    document.getElementById('mock-test-area').innerHTML =
      `<div style="color:var(--danger)">⚠️ ${e.message}</div>`;
  }
}

function renderMockResult(data) {
  document.getElementById('mock-test-area').style.display = 'none';
  const ra = document.getElementById('mock-result-area');
  ra.style.display = 'block';

  const colorFor = p => p >= 80 ? '#22c55e' : p >= 60 ? '#eab308' : p >= 40 ? '#f97316' : '#ef4444';

  let html = `
    <div class="score-display">
      <div class="score-number" style="color:${colorFor(data.percentage)}">${data.score}/${data.total}</div>
      <div class="score-label">SCORE</div>
      <div style="font-size:24px;margin:6px 0;color:${colorFor(data.percentage)}">${data.percentage}%</div>
      <div class="grade-badge">${data.grade}</div>
    </div>`;

  if (data.weak_topics && data.weak_topics.length) {
    html += `<div style="margin-top:14px;padding:12px;background:rgba(255,107,107,.07);border-radius:8px;border:1px solid rgba(255,107,107,.2)">
      <strong style="color:#ff6b6b">⚠️ Weak Areas:</strong> ${data.weak_topics.join(', ')}
    </div>`;
  }

  if (data.ai_feedback) {
    html += `<div style="margin-top:14px"><strong style="color:var(--acc-p)">🤖 AI Feedback:</strong>
      <div style="margin-top:8px">${fmt(data.ai_feedback)}</div></div>`;
  }

  // Detailed breakdown
  html += `<div style="margin-top:16px"><strong style="color:var(--tx-p)">📋 Detailed Results:</strong>`;
  (data.results || []).forEach((r, i) => {
    const q = (mockTest.questions || [])[r.index] || {};
    html += `<div style="margin:8px 0;padding:10px;border-radius:7px;border:1px solid ${r.is_correct ? 'rgba(34,197,94,.2)' : 'rgba(255,107,107,.2)'};background:${r.is_correct ? 'rgba(34,197,94,.05)' : 'rgba(255,107,107,.05)'}">
      <div style="font-size:11px;color:var(--tx-t);margin-bottom:4px">Q${r.index+1} · ${q.topic||''}</div>
      <span style="color:${r.is_correct ? '#22c55e' : '#ff6b6b'}">${r.is_correct ? '✅ Correct' : '❌ Wrong'}</span>
      ${!r.is_correct ? ` · Correct: <strong>${r.correct_answer}</strong>` : ''}
      ${r.explanation ? `<div style="font-size:12px;color:var(--tx-s);margin-top:6px">${fmt(r.explanation)}</div>` : ''}
    </div>`;
  });
  html += `</div>`;

  html += `<div class="btn-row" style="margin-top:16px">
    <button class="action-btn" onclick="resetMockTest()">🔄 New Test</button>
  </div>`;

  ra.innerHTML = html;
  setTimeout(() => renderMath(ra), 100);
}

function resetMockTest() {
  mockTest = null; mockAnswerKey = null; mockUserAnswers = {}; mockCurrentQ = 0;
  if (mockTimerInterval) { clearInterval(mockTimerInterval); mockTimerInterval = null; }
  document.getElementById('mock-setup').style.display = 'block';
  document.getElementById('mock-test-area').style.display = 'none';
  document.getElementById('mock-result-area').style.display = 'none';
  document.getElementById('mock-test-area').innerHTML = '';
  document.getElementById('mock-result-area').innerHTML = '';
}

    const data = await apiFetch('/api/research', { type: V('r-type')||'topic', query: q });
    showResult('r-result', fmt(data.response || 'No result'));
  } catch(e) { showResult('r-result', `<span style="color:var(--danger)">⚠️ ${e.message}</span>`);
  } finally { setBtn('r-btn', false, 'Research'); }
}

async function showExamInfo() {
  showResult('exam-result', '<span style="color:var(--acc-p)">⏳ Loading…</span>');
  try {
    const r = await apiFetch('/api/exam/info', { exam: V('exam-sel')||'jam' });
    const d = r.details || {};
    showResult('exam-result', fmt(
      `## ${d.title}\n\n` +
      `**📅 When:** ${d.when}\n\n**⏱️ Duration:** ${d.duration}\n\n` +
      `**📊 Questions:** ${d.questions}\n\n**📝 Subjects:** ${d.subjects}\n\n` +
      `**🎯 Eligibility:** ${d.eligibility}\n\n**💰 Fee:** ${d.fee}\n\n` +
      `**🏆 Admission:** ${d.admission}\n\n**📈 Cutoff:** ${d.cutoff}\n\n` +
      `**➕ Marking:** ${d.marking || 'N/A'}`
    ));
  } catch(e) { showResult('exam-result', `<span style="color:var(--danger)">⚠️ ${e.message}</span>`); }
}

async function runMathematician() {
  setBtn('m-btn', true, 'Loading…');
  try {
    const r = await apiFetch('/api/mathematician', { name: V('m-name')||'Ramanujan' });
    showResult('m-result', fmt(`## ${r.name}\n\n${r.biography || 'Information unavailable'}`));
  } catch(e) { showResult('m-result', `<span style="color:var(--danger)">⚠️ ${e.message}</span>`);
  } finally { setBtn('m-btn', false, 'Explore'); }
}

async function runTheorem() {
  setBtn('t-btn', true, 'Proving…');
  try {
    const r = await apiFetch('/api/theorem/prove', { theorem: V('t-name')||'Pythagorean Theorem' });
    showResult('t-result', fmt(r.proof || 'Proof unavailable'));
  } catch(e) { showResult('t-result', `<span style="color:var(--danger)">⚠️ ${e.message}</span>`);
  } finally { setBtn('t-btn', false, 'Prove'); }
}

async function runProjects() {
  setBtn('p-btn', true, 'Generating…');
  try {
    const r = await apiFetch('/api/projects/generate', { topic: V('p-topic')||'Calculus' });
    showResult('p-result', fmt(typeof r.projects === 'string' ? r.projects : JSON.stringify(r.projects, null, 2)));
  } catch(e) { showResult('p-result', `<span style="color:var(--danger)">⚠️ ${e.message}</span>`);
  } finally { setBtn('p-btn', false, 'Generate Ideas'); }
}

    .then(d => {
