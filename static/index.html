<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>MathSphere v12.2 — Mathematics AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.26.0/plotly.min.js"></script>
<style>
:root{
  --bg-deep:#0a0e27;--bg-main:#0f1437;--bg-light:#14194f;
  --acc-p:#00d9ff;--acc-s:#7c3aed;--acc-t:#06f7d6;
  --tx-p:#f8fafc;--tx-s:#a8b7d1;--tx-t:#6b7a94;
  --gold:#d4a574;--danger:#ff6b6b;--success:#22c55e;
  --font-d:'Playfair Display',serif;--font-b:'Poppins',sans-serif;--font-m:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;position:fixed;overflow:hidden;}
body{background:linear-gradient(135deg,var(--bg-deep),#1a1f4b);color:var(--tx-p);font-family:var(--font-b);font-size:14px;line-height:1.65;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(circle at 20% 80%,rgba(0,217,255,.12),transparent 50%),
             radial-gradient(circle at 80% 20%,rgba(124,58,237,.08),transparent 50%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(0deg,transparent 24%,rgba(0,217,255,.03) 25%,rgba(0,217,255,.03) 26%,transparent 27%),
                   linear-gradient(90deg,transparent 24%,rgba(0,217,255,.03) 25%,rgba(0,217,255,.03) 26%,transparent 27%);
  background-size:60px 60px;opacity:.5;}
#app{position:relative;z-index:1;display:flex;height:100%;width:100%;overflow:hidden;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* SIDEBAR */
#sidebar{width:262px;flex-shrink:0;background:rgba(10,14,39,.97);backdrop-filter:blur(20px);
  border-right:1px solid rgba(0,217,255,.2);display:flex;flex-direction:column;
  overflow:hidden;transition:transform .3s ease;z-index:200;}
.logo-wrap{padding:16px;border-bottom:1px solid rgba(0,217,255,.2);display:flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,rgba(0,217,255,.04),rgba(124,58,237,.04));}
.logo-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--acc-p),var(--acc-s));
  font-size:20px;box-shadow:0 0 25px rgba(0,217,255,.35);}
.logo-name{font-family:var(--font-d);font-size:16px;font-weight:800;
  background:linear-gradient(135deg,var(--tx-p),var(--acc-p));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.logo-ver{font-size:10px;color:var(--tx-t);font-family:var(--font-m);}
.sb-scroll{flex:1;overflow-y:auto;padding:6px;}
.sb-section{padding:10px 10px 3px;font-size:9px;color:var(--tx-t);font-family:var(--font-m);letter-spacing:2px;text-transform:uppercase;}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;border:none;
  background:transparent;color:var(--tx-s);cursor:pointer;border-radius:7px;
  font-family:var(--font-b);font-size:12.5px;font-weight:500;transition:all .2s;
  text-align:left;margin:1px 0;}
.nav-btn:hover{color:var(--tx-p);background:rgba(0,217,255,.07);}
.nav-btn.active{background:linear-gradient(90deg,rgba(0,217,255,.12),rgba(0,217,255,.04));
  color:var(--acc-p);border:1px solid rgba(0,217,255,.25);}
.nav-btn .em{font-size:14px;}

/* TOPBAR */
#topbar{display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid rgba(0,217,255,.2);
  background:rgba(10,14,39,.85);backdrop-filter:blur(20px);flex-shrink:0;}
#hamburger{display:none;background:rgba(0,217,255,.08);border:1px solid rgba(0,217,255,.2);
  color:var(--tx-s);width:34px;height:34px;border-radius:7px;cursor:pointer;
  align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
#mode-title{font-family:var(--font-d);font-weight:700;font-size:16px;
  background:linear-gradient(135deg,var(--tx-p),var(--acc-p));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;flex:1;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--acc-t);box-shadow:0 0 10px var(--acc-t);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.7}}
.topbar-btn{background:rgba(0,217,255,.07);border:1px solid rgba(0,217,255,.2);
  color:var(--tx-s);padding:5px 11px;border-radius:6px;font-family:var(--font-m);
  font-size:10px;cursor:pointer;transition:all .2s;}
.topbar-btn:hover{background:rgba(0,217,255,.15);color:var(--acc-p);}

/* CHAT AREA */
#chat-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:18px;
  display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;}

/* MESSAGES */
.msg{display:flex;gap:9px;animation:msgIn .3s cubic-bezier(.4,0,.2,1);}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.msg.user .avatar{background:linear-gradient(135deg,#1a2d5c,#2a1f4f);border:1px solid rgba(124,58,237,.3);}
.msg.bot .avatar{background:linear-gradient(135deg,var(--acc-p),var(--acc-s));box-shadow:0 0 12px rgba(0,217,255,.3);}
.bubble{max-width:82%;padding:12px 15px;border-radius:13px;font-size:13.5px;line-height:1.9;
  overflow-wrap:break-word;word-break:break-word;min-width:0;backdrop-filter:blur(8px);}
.msg.user .bubble{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(0,217,255,.07));
  border:1px solid rgba(124,58,237,.2);}
.msg.bot .bubble{background:linear-gradient(135deg,rgba(0,217,255,.06),rgba(20,25,79,.45));
  border:1px solid rgba(0,217,255,.16);}
.bubble code{font-family:var(--font-m);font-size:11px;background:rgba(0,0,0,.4);padding:2px 5px;border-radius:4px;color:var(--acc-t);}
.bubble pre{background:rgba(0,0,0,.5);border:1px solid rgba(0,217,255,.15);border-radius:7px;
  padding:11px;margin:7px 0;overflow-x:auto;font-family:var(--font-m);font-size:11px;line-height:1.6;}
.bubble h2,.bubble h3{color:var(--acc-p);margin:9px 0 3px;}
.bubble strong{color:var(--tx-p);}

/* INPUT AREA */
#inputarea{padding:10px 18px;border-top:1px solid rgba(0,217,255,.2);
  background:rgba(10,14,39,.85);backdrop-filter:blur(20px);flex-shrink:0;}
.inp-outer{display:flex;flex-direction:column;gap:6px;}
.inp-wrap{display:flex;gap:7px;align-items:flex-end;background:rgba(20,25,79,.7);
  border:1px solid rgba(0,217,255,.2);border-radius:11px;padding:8px 9px 8px 13px;
  transition:all .25s;}
.inp-wrap:focus-within{border-color:var(--acc-p);box-shadow:0 4px 25px rgba(0,217,255,.1);}
#input{flex:1;background:none;border:none;outline:none;color:var(--tx-p);
  font-family:var(--font-b);font-size:14px;line-height:1.6;resize:none;
  max-height:120px;min-height:24px;}
#input::placeholder{color:var(--tx-t);}
.inp-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.iico{width:32px;height:32px;background:rgba(0,217,255,.07);border:1px solid rgba(0,217,255,.18);
  border-radius:6px;color:var(--tx-t);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0;padding:0;}
.iico:hover{background:rgba(0,217,255,.16);border-color:var(--acc-p);color:var(--acc-p);}
.iico.active{background:rgba(6,247,214,.15);border-color:var(--acc-t);color:var(--acc-t);}
#send-btn{width:32px;height:32px;background:linear-gradient(135deg,var(--acc-p),var(--acc-s));
  border:none;border-radius:6px;color:white;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;box-shadow:0 3px 12px rgba(0,217,255,.3);transition:all .25s;padding:0;}
#send-btn:hover:not(:disabled){transform:scale(1.1);box-shadow:0 6px 22px rgba(0,217,255,.5);}
#send-btn:disabled{opacity:.35;cursor:not-allowed;}
#img-preview{display:none;padding:8px 10px;background:rgba(0,217,255,.07);border-radius:8px;
  border:1px solid rgba(0,217,255,.2);font-size:11px;color:var(--tx-s);
  font-family:var(--font-m);align-items:center;gap:8px;}
#img-preview.show{display:flex;}
#img-preview img{width:36px;height:36px;object-fit:cover;border-radius:4px;border:1px solid rgba(0,217,255,.3);}
#img-preview button{padding:2px 8px;font-size:11px;}
.inp-hint{text-align:center;font-size:10px;color:var(--tx-t);font-family:var(--font-m);}

/* TYPING */
.typing{display:flex;gap:5px;padding:11px 13px;background:rgba(0,217,255,.06);
  border:1px solid rgba(0,217,255,.16);border-radius:13px;width:fit-content;}
.td{width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,var(--acc-p),var(--acc-s));animation:bounce 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-8px);opacity:1}}

/* WELCOME */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:24px;text-align:center;overflow-y:auto;}
.big-icon{width:82px;height:82px;border-radius:20px;display:flex;align-items:center;justify-content:center;
  font-size:36px;box-shadow:0 18px 45px rgba(0,217,255,.35);
  animation:iconFloat 4s ease-in-out infinite;margin-bottom:18px;
  background:linear-gradient(135deg,var(--acc-p),var(--acc-s));}
@keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#welcome h1{font-family:var(--font-d);font-size:28px;font-weight:800;margin-bottom:8px;
  background:linear-gradient(135deg,var(--tx-p),var(--acc-p));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
#welcome p{color:var(--tx-s);max-width:440px;font-size:13px;line-height:1.75;margin-bottom:20px;}
.feat-grid{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:540px;}
.feat{background:rgba(0,217,255,.07);border:1px solid rgba(0,217,255,.16);border-radius:7px;
  padding:6px 12px;font-size:11px;color:var(--tx-s);font-family:var(--font-m);}

/* TOAST */
.toast{position:fixed;top:16px;right:16px;padding:10px 15px;border-radius:8px;
  font-size:12px;z-index:9999;font-family:var(--font-m);
  animation:toastIn .3s ease;backdrop-filter:blur(10px);border:1px solid;max-width:300px;}
@keyframes toastIn{from{opacity:0;transform:translateX(70px)}to{opacity:1;transform:translateX(0)}}
.toast.ok{background:rgba(6,247,214,.1);border-color:rgba(6,247,214,.3);color:var(--acc-t);}
.toast.info{background:rgba(0,217,255,.1);border-color:rgba(0,217,255,.3);color:var(--acc-p);}
.toast.err{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.3);color:#ff6b6b;}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);
  border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
.katex{color:var(--tx-p)!important;}

/* PANEL AREA */
#panel-area{flex:1;overflow-y:auto;padding:16px;display:none;}
.panel-card{background:linear-gradient(135deg,rgba(0,217,255,.05),rgba(124,58,237,.04));
  border:1px solid rgba(0,217,255,.16);border-radius:13px;padding:20px;
  animation:fadeUp .3s ease;max-width:860px;margin:0 auto;}
.panel-title{font-family:var(--font-d);font-weight:700;font-size:16px;color:var(--tx-p);margin-bottom:3px;}
.panel-sub{font-size:11px;color:var(--tx-t);font-family:var(--font-m);margin-bottom:14px;}
.form-row{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:130px;}
.form-label{font-size:10px;color:var(--tx-t);font-family:var(--font-m);letter-spacing:1px;text-transform:uppercase;}
.form-input,.form-select{background:rgba(20,25,79,.8);border:1px solid rgba(0,217,255,.18);
  color:var(--tx-p);border-radius:7px;padding:8px 11px;font-family:var(--font-b);font-size:13px;outline:none;}
.form-input:focus,.form-select:focus{border-color:var(--acc-p);box-shadow:0 0 10px rgba(0,217,255,.1);}
.action-btn{background:linear-gradient(135deg,var(--acc-p),var(--acc-s));border:none;color:white;
  padding:10px 22px;border-radius:8px;font-family:var(--font-b);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .25s;box-shadow:0 3px 14px rgba(0,217,255,.28);}
.action-btn:hover:not(:disabled){transform:translateY(-2px);}
.action-btn:disabled{opacity:.4;cursor:not-allowed;}
.result-box{background:rgba(0,0,0,.3);border:1px solid rgba(0,217,255,.13);border-radius:9px;
  padding:16px;margin-top:12px;line-height:1.9;font-size:13.5px;color:var(--tx-p);
  overflow-wrap:break-word;max-height:65vh;overflow-y:auto;display:none;}
.result-box.show{display:block;}
.graph-box{background:rgba(0,0,0,.35);border:1px solid rgba(0,217,255,.16);border-radius:9px;
  padding:8px;margin-top:10px;height:360px;display:none;}
.graph-box.show{display:block;}

@media(max-width:700px){
  #sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);width:260px;}
  #sidebar.open{transform:translateX(0);}
  #hamburger{display:flex;}
  #chat-area{padding:10px;}
  #inputarea{padding:8px 10px;}
  .bubble{max-width:90%;}
  #welcome h1{font-size:22px;}.big-icon{width:68px;height:68px;font-size:28px;}
}
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="logo-wrap">
      <div class="logo-icon">∑</div>
      <div>
        <div class="logo-name">MathSphere</div>
        <div class="logo-ver">v12.2 — Fixed</div>
      </div>
    </div>
    <div class="sb-scroll">
      <div class="sb-section">🧮 CORE</div>
      <button class="nav-btn active" id="nav-ask" onclick="setMode('ask')"><span class="em">💬</span>Ask Anupam</button>
      <button class="nav-btn" id="nav-graph" onclick="setMode('graph')"><span class="em">📈</span>Graph Plotter</button>
      <button class="nav-btn" id="nav-formula" onclick="setMode('formula')"><span class="em">📊</span>Formula Sheet</button>
      <div class="sb-section">📚 PRACTICE</div>
      <button class="nav-btn" id="nav-pyqs" onclick="setMode('pyqs')"><span class="em">❓</span>PYQs</button>
      <button class="nav-btn" id="nav-quiz" onclick="setMode('quiz')"><span class="em">🧩</span>Quiz</button>
      <div class="sb-section">🔬 EXPLORE</div>
      <button class="nav-btn" id="nav-theorem" onclick="setMode('theorem')"><span class="em">📐</span>Theorems</button>
      <button class="nav-btn" id="nav-mathematician" onclick="setMode('mathematician')"><span class="em">👨‍🔬</span>Mathematicians</button>
      <button class="nav-btn" id="nav-projects" onclick="setMode('projects')"><span class="em">🚀</span>Projects</button>
    </div>
  </nav>

  <div id="main">
    <!-- TOPBAR -->
    <div id="topbar">
      <button id="hamburger" onclick="toggleSidebar()">☰</button>
      <div id="mode-title">💬 Ask Anupam</div>
      <div class="status-dot"></div>
      <button class="topbar-btn" onclick="clearAll()">CLEAR</button>
    </div>

    <!-- CHAT AREA -->
    <div id="chat-area"></div>
    
    <!-- PANEL AREA (for non-chat modes) -->
    <div id="panel-area"></div>

    <!-- INPUT (only in chat mode) -->
    <div id="inputarea">
      <div class="inp-outer">
        <!-- Image preview -->
        <div id="img-preview">
          <img id="img-thumb" src="" alt=""/>
          <span id="img-name" style="flex:1;word-break:break-all;max-width:150px">image.jpg</span>
          <button class="iico" onclick="clearImage()" style="padding:0;width:20px;height:20px;font-size:12px">✕</button>
        </div>
        
        <!-- Input box -->
        <div class="inp-wrap">
          <textarea id="input" placeholder="Ask any mathematics question…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <div class="inp-actions">
            <!-- IMAGE UPLOAD BUTTON - CRITICAL FIX -->
            <button class="iico" id="img-label" onclick="document.getElementById('img-upload').click()" title="Upload image">📷</button>
            <input type="file" id="img-upload" accept="image/*" style="display:none" onchange="handleImageUpload(event)"/>
            
            <!-- SEND BUTTON -->
            <button id="send-btn" onclick="sendMsg()" title="Send" style="padding:0">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
        <div class="inp-hint">📷 Upload image · Shift+Enter new line · Enter to send</div>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let mode = 'ask';
let chatHistory = [];
let busy = false;
let pendingImageB64 = null;
let pendingImageType = 'image/jpeg';

const MODES = {
  ask:           { title: '💬 Ask Anupam' },
  graph:         { title: '📈 Graph Plotter' },
  formula:       { title: '📊 Formula Sheet' },
  pyqs:          { title: '❓ Previous Year Questions' },
  quiz:          { title: '🧩 Quick Quiz' },
  theorem:       { title: '📐 Theorem Prover' },
  mathematician: { title: '👨‍🔬 Mathematicians' },
  projects:      { title: '🚀 Projects' },
};

// ════════════════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════════════════
function V(id) {
  const el = document.getElementById(id);
  return el ? (el.value || '').trim() : '';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function toast(msg, type = 'ok') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function scrollChat() {
  const ca = document.getElementById('chat-area');
  if (ca) setTimeout(() => { ca.scrollTop = ca.scrollHeight; }, 50);
}

// ════════════════════════════════════════════════════════════
// IMAGE UPLOAD - FIXED
// ════════════════════════════════════════════════════════════
function handleImageUpload(event) {
  const file = event.target.files?.[0];
  if (!file) return;

  if (!file.type.startsWith('image/')) {
    toast('Please select an image file', 'err');
    return;
  }
  if (file.size > 20 * 1024 * 1024) {
    toast('Image too large (max 20MB)', 'err');
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    pendingImageB64 = e.target.result;
    pendingImageType = file.type;

    // Show preview
    document.getElementById('img-thumb').src = pendingImageB64;
    document.getElementById('img-name').textContent = 
      file.name.length > 28 ? file.name.slice(0,25)+'…' : file.name;
    document.getElementById('img-preview').classList.add('show');
    document.getElementById('img-label').classList.add('active');
    document.getElementById('input').placeholder = 
      'Ask about this image or press Send to analyze…';
    toast('📷 Image ready — ask your question', 'ok');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function clearImage() {
  pendingImageB64 = null;
  pendingImageType = 'image/jpeg';
  document.getElementById('img-preview').classList.remove('show');
  document.getElementById('img-label').classList.remove('active');
  document.getElementById('input').placeholder = 'Ask any mathematics question…';
}

// ════════════════════════════════════════════════════════════
// LATEX FORMATTING
// ════════════════════════════════════════════════════════════
function fmt(raw) {
  if (!raw) return '';
  let t = String(raw);

  // Extract LaTeX first
  const latexBlocks = [];
  const protectLatex = (match) => {
    latexBlocks.push(match);
    return `\x00LATEX${latexBlocks.length - 1}\x00`;
  };

  t = t.replace(/\\\[[\s\S]*?\\\]/g, protectLatex);
  t = t.replace(/\$\$[\s\S]*?\$\$/g, protectLatex);
  t = t.replace(/\\\([\s\S]*?\\\)/g, protectLatex);
  t = t.replace(/\$[^\$\n]{1,300}?\$/g, protectLatex);

  // HTML escape non-LaTeX
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Restore LaTeX
  t = t.replace(/\x00LATEX(\d+)\x00/g, (_, i) => latexBlocks[+i]);

  // Markdown
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre>$1</pre>');
  t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  t = t.replace(/\n/g, '<br>');

  return t;
}

function renderMath(el) {
  if (!el || typeof renderMathInElement === 'undefined') return;
  try {
    renderMathInElement(el, {
      delimiters: [
        { left: '\\[', right: '\\]', display: true },
        { left: '\\(', right: '\\)', display: false },
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
      ],
      throwOnError: false,
      strict: false,
    });
  } catch(e) {}
}

// ════════════════════════════════════════════════════════════
// CHAT
// ════════════════════════════════════════════════════════════
async function sendMsg() {
  if (mode !== 'ask') return;
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  const hasImage = !!pendingImageB64;

  if (!text && !hasImage) return;
  if (busy) return;

  // Remove welcome
  document.getElementById('welcome')?.remove();

  const displayText = text || (hasImage ? '📷 Analyze this image' : '');
  addMsg('user', displayText);
  inp.value = '';
  inp.style.height = 'auto';

  const payload = {
    messages: [...chatHistory, { role: 'user', content: displayText }]
  };
  if (hasImage) {
    payload.image_b64 = pendingImageB64;
    payload.image_type = pendingImageType;
  }

  chatHistory.push({ role: 'user', content: displayText });
  if (chatHistory.length > 30) chatHistory = chatHistory.slice(-30);

  clearImage();
  showTyping();
  busy = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    hideTyping();

    if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);

    const ans = data.answer || '⚠️ No response';
    chatHistory.push({ role: 'assistant', content: ans });
    if (chatHistory.length > 30) chatHistory = chatHistory.slice(-30);
    addMsg('bot', ans);
  } catch(e) {
    hideTyping();
    console.error('Chat error:', e);
    addMsg('bot', `⚠️ **Error:** ${e.message}`);
  }
  busy = false;
  document.getElementById('send-btn').disabled = false;
}

function addMsg(role, text) {
  const ca = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="avatar">${role === 'bot' ? '∑' : '👤'}</div><div class="bubble"></div>`;
  const bubble = div.querySelector('.bubble');
  bubble.innerHTML = fmt(text);
  ca.appendChild(div);
  scrollChat();
  requestAnimationFrame(() => { renderMath(bubble); scrollChat(); });
}

function showTyping() {
  const ca = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-ind';
  div.innerHTML = `<div class="avatar">∑</div><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  ca.appendChild(div);
  scrollChat();
}

function hideTyping() {
  document.getElementById('typing-ind')?.remove();
}

function setMode(m) {
  mode = m;

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById(`nav-${m}`);
  if (nb) nb.classList.add('active');

  document.getElementById('mode-title').textContent = (MODES[m] || MODES.ask).title;

  const chatArea = document.getElementById('chat-area');
  const panelArea = document.getElementById('panel-area');
  const inputArea = document.getElementById('inputarea');

  if (m === 'ask') {
    chatArea.style.display = 'flex';
    panelArea.style.display = 'none';
    inputArea.style.display = 'block';
    if (chatHistory.length === 0) showWelcome();
  } else {
    chatArea.style.display = 'none';
    panelArea.style.display = 'block';
    inputArea.style.display = 'none';
    renderPanel(m);
  }
}

async function runGraph() {
  const expr = V('g-expr') || 'x**2';
  const xMin = parseFloat(V('g-xmin') || '-10');
  const xMax = parseFloat(V('g-xmax') || '10');
  const pts = parseInt(V('g-pts') || '600');

  if (isNaN(xMin) || isNaN(xMax) || xMin >= xMax) {
    toast('Invalid range', 'err');
    return;
  }

  try {
    const r = await fetch('/api/graph', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ expression: expr, x_min: xMin, x_max: xMax, points: pts })
    });
    const data = await r.json();

    if (!data.success) throw new Error(data.error);

    const allPts = data.points || [];
    const traces = [];
    let segX = [], segY = [];

    for (const p of allPts) {
      if (p.y === null) {
        if (segX.length > 1) traces.push({ x: [...segX], y: [...segY] });
        segX = []; segY = [];
      } else {
        segX.push(p.x); segY.push(p.y);
      }
    }
    if (segX.length > 1) traces.push({ x: segX, y: segY });

    const plotTraces = traces.map((seg, i) => ({
      x: seg.x, y: seg.y, type: 'scatter', mode: 'lines',
      line: { color: i === 0 ? '#00d9ff' : '#7c3aed', width: 2 },
      showlegend: false
    }));

    const pb = document.getElementById('g-plotbox');
    pb.classList.add('show');
    Plotly.newPlot(pb, plotTraces, {
      paper_bgcolor: 'rgba(15,20,55,.98)',
      plot_bgcolor: 'rgba(15,20,55,.95)',
      font: { color: '#a8b7d1', family: 'Poppins' },
      xaxis: { gridcolor: 'rgba(0,217,255,.1)' },
      yaxis: { gridcolor: 'rgba(0,217,255,.1)' },
    }, { responsive: true, displaylogo: false });

    const res = document.getElementById('g-result');
    res.innerHTML = fmt(data.analysis || 'Analysis unavailable');
    res.classList.add('show');
    setTimeout(() => renderMath(res), 100);
    toast('Graph plotted!', 'ok');
  } catch(e) {
    toast(e.message, 'err');
  }
}

async function loadPYQs() {
  try {
    const r = await fetch('/api/pyq/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        exam: V('pyq-exam') || 'jam',
        difficulty: V('pyq-diff') || 'moderate',
        count: parseInt(V('pyq-count') || '5')
      })
    });
    const data = await r.json();
    if (!data.success) throw new Error(data.error);

    const area = document.getElementById('pyq-area');
    area.style.display = 'block';
    let html = '';
    (data.questions || []).forEach((q, i) => {
      html += `<div style="background:rgba(0,217,255,.04);padding:14px;border-radius:8px;margin:10px 0;border-left:3px solid #00d9ff">
        <div style="font-size:11px;color:var(--tx-t);margin-bottom:8px">${q.topic||''} · ${q.year||''} · ${q.difficulty||'moderate'}</div>
        <div style="font-size:13px;line-height:1.9;margin-bottom:12px">${q.question||''}</div>`;
      if (q.options) {
        html += `<div style="display:flex;flex-direction:column;gap:6px">`;
        q.options.forEach(opt => {
          html += `<div style="padding:8px 12px;border-radius:6px;border:1px solid rgba(0,217,255,.15)">${opt}</div>`;
        });
        html += `</div>`;
      }
      html += `<div style="margin-top:10px;padding:10px;background:rgba(6,247,214,.05);border-radius:6px;border-left:2px solid #06f7d6">
        <strong style="color:#06f7d6">Answer:</strong> ${q.answer||'N/A'}<br>
        <div style="margin-top:6px;font-size:12px">${q.explanation||'See detailed solution'}</div>
      </div></div>`;
    });
    document.getElementById('pyq-content').innerHTML = html;
    setTimeout(() => renderMath(area), 100);
    toast(`Loaded ${data.count} questions`, 'ok');
  } catch(e) {
    toast(e.message, 'err');
  }
}
